    notify_Channel:
      type: string
      description: 'Delivery channel. Only `sms` and `email` are supported by the cloud

        fold; `voice` and `whatsapp` are defined by the notify types but not

        wired here.

        '
      enum:
      - sms
      - email
      - voice
      - whatsapp
    notify_Error:
      type: object
      required:
      - status
      - msg
      properties:
        status:
          type: string
          enum:
          - error
          description: Always "error" for error responses
        msg:
          type: string
          description: Human-readable error message
        code:
          type: integer
          description: Application-specific error code
        data:
          type: object
          description: Additional error context
        data2:
          type: object
          description: Additional error details
        requestId:
          type: string
          description: Request ID for debugging
    notify_HealthResponse:
      type: object
      description: Fixed health body.
      properties:
        service:
          type: string
          example: notify
        status:
          type: string
          example: ok
    notify_SendRequest:
      type: object
      description: 'Notification send request (`notify/pkg/types.SendRequest`). Delivery

        content is either a raw `subject`/`body`, or a template resolved from

        `template_id`/`event` rendered against `template_vars`.

        '
      required:
      - to
      properties:
        to:
          type: array
          description: 'Destination address(es). Phone number for SMS, email for email.

            Multiple recipients fan out into one provider call each and produce

            one response entry per recipient.

            '
          items:
            type: string
        channel:
          $ref: '#/components/schemas/notify_Channel'
        provider:
          type: string
          description: 'Pins a specific provider service name (e.g. `twilio`, `plivo`,

            `twilio_email`, `mail`). When omitted the fold picks the org''s

            default for the channel from configured KMS credentials.

            '
        subject:
          type: string
          description: Raw subject; used verbatim when `body` is set (no-template path).
        body:
          type: string
          description: 'Raw message body. When non-empty it wins verbatim and no template is

            rendered.

            '
        template_id:
          type: string
          description: 'Built-in template identifier. When `body` is empty, the template is

            resolved from `template_id` or, failing that, `event`.

            '
        template_vars:
          type: object
          additionalProperties: true
          description: 'Free-form variables the template is rendered against (e.g. `otp`,

            `app`, `recipient`). A missing `app` defaults to `Hanzo`.

            '
        event:
          type: string
          description: 'Event-catalog identifier. Also used as a fallback template id when

            `template_id` is unset (the IAM OTP path sends `event: iam.otp_sent`

            with no `template_id`).

            '
        idempotency_key:
          type: string
          description: 'Per-tenant deduplication key. Accepted on the wire; the sync fold

            does not persist a Message row.

            '
        send_at:
          type: string
          description: 'RFC3339 schedule time for async dispatch. Async is not available in

            the fold, so a set value has no effect on the sync path.

            '
        options:
          type: object
          additionalProperties: true
          description: Free-form per-provider knob bag.
    notify_SendResponse:
      type: object
      description: 'Canonical send result (`notify/pkg/types.SendResponse`). In the sync

        fold `task_id` is always empty and `status` is the terminal result.

        '
      required:
      - message_id
      - status
      properties:
        message_id:
          type: string
          description: Generated 16-byte hex message id (opaque handle).
        task_id:
          type: string
          description: 'hanzoai/tasks workflow id in async mode; always empty in the sync

            fold.

            '
        status:
          type: string
          description: 'Terminal delivery status. In the sync fold this is `sent` on success

            or `failed` on terminal failure. (The type also defines `queued`,

            `sending`, `delivered` for the async plane, which is not folded.)

            '
          enum:
          - queued
          - sending
          - sent
          - delivered
          - failed
        error:
          type: string
          description: Set on terminal failure (sync mode only).
    notify_SendResponseList:
      type: object
      description: "Multi-recipient wrapper. Returned only when the request has more than one\nrecipient \u2014 one `SendResponse`\
        \ per recipient, in request order.\n"
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/notify_SendResponse'
