  /v1/agents/{ref}:
    get:
      tags:
      - cloud_Agents API
      description: Get an agent by its public id (agent_...) or org-unique name, with its instructions and up to 20 recent
        runs.
      operationId: cloud_AgentsController.Get
      parameters:
      - in: path
        name: ref
        description: The agent's public id (agent_...) or org-unique name.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The agent detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.AgentDetail'
        '404':
          description: No such agent in this org.
    patch:
      tags:
      - cloud_Agents API
      description: Update an agent's mutable fields. The resulting execution mode + schedule are re-validated, so a partial
        update can never leave a long-running agent without a valid cron.
      operationId: cloud_AgentsController.Update
      parameters:
      - in: path
        name: ref
        description: The agent's public id (agent_...) or org-unique name.
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.UpdateAgentRequest'
      responses:
        '200':
          description: The updated agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Agent'
        '400':
          description: Invalid field or lifecycle.
        '404':
          description: No such agent in this org.
        '409':
          description: The org's long-running-agent limit is reached.
    delete:
      tags:
      - cloud_Agents API
      description: Delete an agent and its run history.
      operationId: cloud_AgentsController.Delete
      parameters:
      - in: path
        name: ref
        description: The agent's public id (agent_...) or org-unique name.
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted.
        '404':
          description: No such agent in this org.
  /v1/agents/{ref}/run:
    post:
      tags:
      - cloud_Agents API
      description: "Run the agent \u2014 composes its instructions with the caller input and executes one real chat completion\
        \ through the in-process AI client, records the run, and returns the run view. Requires a validated principal (money\
        \ path). The org's credit balance is pre-authorized before any inference (fail-closed); a successful run debits a\
        \ flat per-run fee metered as product=agent. Duration is recorded; the run is real."
      operationId: cloud_AgentsController.Run
      parameters:
      - in: path
        name: ref
        description: The agent's public id (agent_...) or org-unique name.
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.RunRequest'
      responses:
        '200':
          description: The completed run (status ok).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Run'
        '402':
          description: Insufficient org credit balance (run did not execute).
        '403':
          description: A validated principal is required to run an agent.
        '404':
          description: No such agent in this org.
        '502':
          description: The run executed but the upstream model failed; the recorded error run is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Run'
        '503':
          description: Inference is not configured on this deployment, or the credit ledger is unreachable.
  /v1/agents/{ref}/runs:
    get:
      tags:
      - cloud_Agents API
      description: The agent's run history, newest first.
      operationId: cloud_AgentsController.Runs
      parameters:
      - in: path
        name: ref
        description: The agent's public id (agent_...) or org-unique name.
        required: true
        schema:
          type: string
      - in: query
        name: limit
        description: Max runs to return (default 50, max 200).
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: The run history.
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/cloud_agents.Run'
        '404':
          description: No such agent in this org.
