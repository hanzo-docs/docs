      summary: Read per-(org,product) settings
      description: "Returns the org's persisted config document for a product, plus the NAMES\nof set secret fields (values\
        \ are never returned). When the org has never\nwritten config for the product, an honest empty config (`{}`) is returned\n\
        with 200 \u2014 not a 404.\n"
      operationId: observe_getSettings
      parameters:
      - name: product
        in: path
        required: true
        description: Console product slug. Must match `^[a-z0-9][a-z0-9._-]{0,62}$`.
        schema:
          type: string
          pattern: ^[a-z0-9][a-z0-9._-]{0,62}$
      responses:
        '200':
          description: Settings view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observe_SettingsView'
        '400':
          $ref: '#/components/responses/observe_BadRequest'
        '401':
          $ref: '#/components/responses/observe_Unauthorized'
        '403':
          $ref: '#/components/responses/observe_Forbidden'
    put:
      tags:
      - observe_Settings
      summary: Write per-(org,product) settings
      description: "Upserts the org's non-secret config document for a product. Secret fields\nare routed to KMS and NEVER\
        \ stored in SQLite; a secret whose value is\nempty or the mask sentinel (`\u2022\u2022\u2022\u2022\u2022\u2022\u2022\
        \u2022`) is treated as unchanged. If KMS is\nunavailable, a request carrying secrets fails closed (503) rather than\n\
        persisting plaintext. Returns the updated settings view.\n"
      operationId: observe_putSettings
      parameters:
      - name: product
        in: path
        required: true
        description: Console product slug. Must match `^[a-z0-9][a-z0-9._-]{0,62}$`.
        schema:
          type: string
          pattern: ^[a-z0-9][a-z0-9._-]{0,62}$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/observe_SettingsRequest'
      responses:
        '200':
          description: Updated settings view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observe_SettingsView'
        '400':
          $ref: '#/components/responses/observe_BadRequest'
        '401':
          $ref: '#/components/responses/observe_Unauthorized'
        '403':
          $ref: '#/components/responses/observe_Forbidden'
        '500':
          $ref: '#/components/responses/observe_InternalError'
        '503':
          $ref: '#/components/responses/observe_ServiceUnavailable'
