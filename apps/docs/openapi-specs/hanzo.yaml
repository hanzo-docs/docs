    kms_SdkEnvelope:
      type: object
      description: 'Canonical signed wrapper for every /v1/sdk operation. The signature is ML-DSA-65 over SHAKE256("lux-svc-envelope-v1"
        || FullDigest || canonical(v,id,ts,nonce,op,req)). One source of truth in luxfi/kms/pkg/envelope.

        '
      required:
      - v
      - id
      - ts
      - nonce
      - op
      - req
      - sig
      properties:
        v:
          type: integer
          description: Envelope version. Only 1 is accepted.
          example: 1
        id:
          $ref: '#/components/schemas/kms_SdkEnvelopeIdentity'
        ts:
          type: integer
          format: int64
          description: "Unix seconds at signing. Rejected outside \xB15m of server time."
        nonce:
          type: string
          description: Caller-fresh anti-replay nonce (typically 16 random bytes, base64). Reuse within the window is rejected.
        op:
          type: integer
          description: 'Signed operation. 0x0040 get, 0x0041 put (also rotate), 0x0042 list, 0x0043 delete, 0x0050 sign, 0x0051
            verify.

            '
          example: 64
        req:
          type: object
          description: "Inner request JSON. Shape by op \u2014 secrets:{path,name,env[,value]}; sign:{validator_id,key_type,message};\
            \ verify adds {signature}.\n"
        sig:
          type: string
          format: byte
          description: ML-DSA-65 signature (base64) over the canonical digest.
    kms_SdkEnvelopeIdentity:
      type: object
      description: The mnemonic-derived service identity block. Bound into the signature.
      required:
      - scheme
      - node
      - digest
      - path
      - pubkey
      properties:
        scheme:
          type: integer
          description: NodeID scheme. 0x42 = ML-DSA-65.
          example: 66
        node:
          type: string
          description: 20-byte canonical NodeID (cb58), the SHAKE256-384 digest prefix.
        digest:
          type: string
          format: byte
          description: 48-byte SHAKE256-384 FullDigest commitment (base64).
        path:
          type: string
          description: BIP-44 service path the identity was derived from (e.g. hanzo/kms-operator).
        pubkey:
          type: string
          format: byte
          description: ML-DSA-65 public key (base64), for offline verification.
