      description: Create an agent (a model + instructions + tool names). A long-running agent additionally requires a 5-field
        cron 'schedule' and is invoked by the scheduler; a one-shot agent runs only when POSTed to /run.
      operationId: cloud_AgentsController.Create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.CreateAgentRequest'
      responses:
        '201':
          description: The created agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Agent'
        '400':
          description: Invalid name, model, instructions, or lifecycle.
        '409':
          description: An agent with that name already exists, or the org's long-running-agent limit is reached.
  /v1/agents/activity:
    get:
      tags:
      - cloud_Agents API
      description: The org-wide recent-activity feed (newest first, capped at 50). Each recorded run is an invoked/failed
        event; each agent's own create/update timestamps are created/updated events. Nothing is invented.
      operationId: cloud_AgentsController.Activity
      responses:
        '200':
          description: The activity feed.
