  /v1/stream/topics:
    get:
      operationId: stream_listTopics
      summary: List topics
      description: List all Kafka topics managed by Hanzo Stream.
      tags:
      - Topics
      responses:
        '200':
          description: Topic list
          content:
            application/json:
              schema:
                type: object
                properties:
                  topics:
                    type: array
                    items:
                      $ref: '#/components/schemas/stream_Topic'
                  total:
                    type: integer
    post:
      operationId: stream_createTopic
      summary: Create a topic
      description: 'Create a new Kafka topic. Under the hood, this creates one PubSub

        JetStream stream per partition.

        '
      tags:
      - Topics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: Topic name
                  example: events
                partitions:
                  type: integer
                  default: 1
                  description: Number of partitions
                replication_factor:
                  type: integer
                  default: 1
                  description: Replication factor for underlying PubSub streams
                config:
                  type: object
                  properties:
                    retention_ms:
                      type: integer
                    cleanup_policy:
                      type: string
                      enum:
                      - delete
                      - compact
                    compression_type:
                      type: string
                      enum:
                      - none
                      - gzip
                      - snappy
                      - lz4
                      - zstd
            examples:
              basic:
                summary: Basic topic
                value:
                  name: events
                  partitions: 3
                  replication_factor: 1
      responses:
        '201':
          description: Topic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stream_Topic'
        '409':
          description: Topic already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stream_Error'
  /v1/stream/topics/{topic}:
    get:
      operationId: stream_getTopicMetadata
      summary: Get topic metadata
      description: Returns topic configuration and partition details.
      tags:
      - Topics
      parameters:
      - name: topic
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Topic metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stream_TopicMetadata'
        '404':
          description: Topic not found
    delete:
      operationId: stream_deleteTopic
      summary: Delete a topic
      description: Delete a topic and all associated JetStream streams.
      tags:
      - Topics
      parameters:
      - name: topic
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Topic deleted
        '404':
          description: Topic not found
  /v1/stream/topics/{topic}/messages:
    post:
      operationId: stream_produceMessages
      summary: Produce messages
      description: 'Produce one or more messages to a topic via REST API.

        For high throughput, use the Kafka wire protocol on port 9092.

        '
      tags:
      - Messages
      parameters:
      - name: topic
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stream_ProduceRequest'
            examples:
              single:
                summary: Single message
                value:
                  records:
                  - value: '{"event":"user.signup","user_id":"usr_123"}'
              keyed:
                summary: Keyed message
                value:
                  records:
                  - key: usr_123
                    value: '{"event":"user.signup"}'
                    partition: 0
      responses:
        '200':
          description: Messages produced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stream_ProduceResponse'
        '404':
          description: Topic not found
    get:
      operationId: stream_consumeMessages
      summary: Consume messages
      description: 'Consume messages from a topic partition via REST API.

        For persistent consumption, use the Kafka wire protocol with consumer groups.

        '
      tags:
      - Messages
      parameters:
      - name: topic
        in: path
        required: true
        schema:
          type: string
      - name: partition
        in: query
        schema:
          type: integer
          default: 0
        description: Partition to consume from
      - name: offset
        in: query
        schema:
          type: string
          default: latest
        description: Starting offset (earliest, latest, or numeric offset)
      - name: limit
        in: query
        schema:
          type: integer
          default: 100
          maximum: 1000
        description: Maximum records to return
      - name: timeout
        in: query
        schema:
          type: integer
          default: 5000
        description: Long-poll timeout in milliseconds
      responses:
        '200':
          description: Messages consumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/stream_ConsumeRecord'
                  next_offset:
                    type: integer
