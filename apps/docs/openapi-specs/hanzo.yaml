  /v1/mq/kv:
    get:
      operationId: mq_listKVBuckets
      summary: List KV buckets
      description: Returns all key-value buckets for the authenticated account.
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_LimitParam'
      - $ref: '#/components/parameters/mq_OffsetParam'
      responses:
        '200':
          description: List of KV buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      $ref: '#/components/schemas/mq_KVBucket'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
    post:
      operationId: mq_createKVBucket
      summary: Create KV bucket
      description: 'Creates a new key-value bucket backed by a JetStream stream.

        Supports configurable history depth, TTL, and replication.

        '
      tags:
      - KeyValue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_KVBucketConfig'
      responses:
        '201':
          description: Bucket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_KVBucket'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '409':
          description: Bucket already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/kv/{bucket}:
    get:
      operationId: mq_getKVBucket
      summary: Get bucket info
      description: Returns bucket configuration and current state.
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      responses:
        '200':
          description: Bucket info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_KVBucket'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    delete:
      operationId: mq_deleteKVBucket
      summary: Delete bucket
      description: Deletes the bucket and all its keys. Irreversible.
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      responses:
        '204':
          description: Bucket deleted
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/kv/{bucket}/keys:
    get:
      operationId: mq_listKVKeys
      summary: List keys in bucket
      description: Returns all keys in the bucket, optionally filtered by pattern.
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      - name: filter
        in: query
        schema:
          type: string
        description: Key filter pattern (supports wildcards).
      - $ref: '#/components/parameters/mq_LimitParam'
      - $ref: '#/components/parameters/mq_OffsetParam'
      responses:
        '200':
          description: List of keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: string
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/kv/{bucket}/watch:
    get:
      operationId: mq_watchKVBucket
      summary: Watch bucket changes via SSE
      description: 'Opens a Server-Sent Events stream that emits KVEntry events for

        every change in the bucket. Optionally filter by key pattern.

        Delivers initial values followed by real-time updates.

        '
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      - name: key
        in: query
        schema:
          type: string
        description: Key pattern filter (supports wildcards).
      - name: include_history
        in: query
        schema:
          type: boolean
          default: false
        description: Include all historical revisions before live updates.
      responses:
        '200':
          description: SSE stream of KV changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/mq_KVEntry'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/kv/{bucket}/{key}:
    get:
      operationId: mq_getKVEntry
      summary: Get value
      description: 'Returns the current value for the key. The revision number is

        included in the X-MQ-Revision response header.

        '
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      - $ref: '#/components/parameters/mq_KeyName'
      responses:
        '200':
          description: Key value
          headers:
            X-MQ-Revision:
              schema:
                type: integer
                format: uint64
              description: Current revision number.
            X-MQ-Created:
              schema:
                type: string
                format: date-time
              description: Timestamp of this revision.
            X-MQ-Operation:
              schema:
                type: string
                enum:
                - put
                - delete
                - purge
              description: Operation that produced this revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_KVEntry'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    put:
      operationId: mq_putKVEntry
      summary: Put value
      description: 'Sets the value for the key. Returns the new revision number. Use

        the X-MQ-Expected-Revision header for optimistic concurrency

        (CAS operation).

        '
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      - $ref: '#/components/parameters/mq_KeyName'
      - name: X-MQ-Expected-Revision
        in: header
        schema:
          type: integer
          format: uint64
        description: 'Expected current revision for CAS. The put fails with 409 if

          the current revision does not match.

          '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: Value to store (base64-encoded for binary data).
              required:
              - value
      responses:
        '200':
          description: Value stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  revision:
                    type: integer
                    format: uint64
                  key:
                    type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
        '409':
          description: Revision mismatch (CAS failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
    delete:
      operationId: mq_deleteKVEntry
      summary: Delete key
      description: 'Deletes the key by writing a tombstone marker. The key''s history

        is preserved according to the bucket''s history setting.

        '
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      - $ref: '#/components/parameters/mq_KeyName'
      responses:
        '204':
          description: Key deleted (tombstone written)
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/kv/{bucket}/{key}/history:
    get:
      operationId: mq_getKVHistory
      summary: Get key history
      description: 'Returns all revisions of the key, from oldest to newest. The

        number of revisions kept is determined by the bucket''s history

        setting.

        '
      tags:
      - KeyValue
      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      - $ref: '#/components/parameters/mq_KeyName'
      responses:
        '200':
          description: Key revision history
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/mq_KVEntry'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/objects:
    get:
      operationId: mq_listObjectStores
      summary: List object stores
      description: Returns all object stores for the authenticated account.
      tags:
      - ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_LimitParam'
      - $ref: '#/components/parameters/mq_OffsetParam'
      responses:
        '200':
          description: List of object stores
          content:
            application/json:
              schema:
                type: object
                properties:
                  stores:
                    type: array
                    items:
                      $ref: '#/components/schemas/mq_ObjectStoreInfo'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
    post:
      operationId: mq_createObjectStore
      summary: Create object store
      description: 'Creates a new object store backed by JetStream. Large objects are

        automatically chunked and stored across the stream.

        '
      tags:
      - ObjectStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_ObjectStoreConfig'
      responses:
        '201':
          description: Object store created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_ObjectStoreInfo'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '409':
          description: Store already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/objects/{store}:
    get:
      operationId: mq_getObjectStore
      summary: Get store info
      description: Returns object store configuration and state.
      tags:
      - ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      responses:
        '200':
          description: Store info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_ObjectStoreInfo'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    delete:
      operationId: mq_deleteObjectStore
      summary: Delete object store
      description: Deletes the store and all objects. Irreversible.
      tags:
      - ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      responses:
        '204':
          description: Store deleted
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/objects/{store}/list:
    get:
      operationId: mq_listObjects
      summary: List objects in store
      description: Returns metadata for all objects in the store.
      tags:
      - ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      - $ref: '#/components/parameters/mq_LimitParam'
      - $ref: '#/components/parameters/mq_OffsetParam'
      responses:
        '200':
          description: List of objects
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items:
                      $ref: '#/components/schemas/mq_ObjectInfo'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/objects/{store}/{name}:
    get:
      operationId: mq_getObject
      summary: Download object
      description: 'Downloads the object as a binary stream. Chunks are reassembled

        transparently.

        '
      tags:
      - ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      - $ref: '#/components/parameters/mq_ObjectName'
      responses:
        '200':
          description: Object binary data
          headers:
            X-MQ-Object-Size:
              schema:
                type: integer
                format: int64
              description: Total object size in bytes.
            X-MQ-Object-Chunks:
              schema:
                type: integer
              description: Number of chunks.
            X-MQ-Object-Digest:
              schema:
                type: string
              description: SHA-256 digest of the object.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    put:
      operationId: mq_putObject
      summary: Upload object
      description: 'Uploads an object to the store. The object is automatically chunked

        for storage. Use multipart/form-data for file uploads or

        application/octet-stream for raw binary.

        '
      tags:
      - ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      - $ref: '#/components/parameters/mq_ObjectName'
      - name: X-MQ-Object-Description
        in: header
        schema:
          type: string
        description: Optional description for the object.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        '200':
          description: Object stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_ObjectInfo'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          description: Store not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '413':
          description: Object exceeds max_bytes limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
    delete:
      operationId: mq_deleteObject
      summary: Delete object
      description: Deletes the object and its chunks from the store.
      tags:
      - ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      - $ref: '#/components/parameters/mq_ObjectName'
      responses:
        '204':
          description: Object deleted
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/publish:
    post:
      operationId: mq_publishMessage
      summary: Publish message to subject
      description: 'Publish a message to the specified subject. Supports optional headers

        and reply-to subject for request/reply patterns. If the subject is

        bound to a JetStream stream, the message is persisted.

        '
      tags:
      - Publish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_PublishRequest'
      responses:
        '200':
          description: Message published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_PublishResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '503':
          description: No responders for subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/request:
    post:
      operationId: mq_requestReply
      summary: Request/reply pattern
      description: 'Publishes a message and waits for a single reply within the specified

        timeout. Uses an ephemeral inbox subject for the reply. Returns the

        reply message or a timeout error.

        '
      tags:
      - Publish
      requestBody:
