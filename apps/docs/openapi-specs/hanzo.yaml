  /v1/sdk/secrets:
    post:
      operationId: kms_sdkSecretsOp
      tags:
      - SDK
      summary: Enveloped secret + threshold-key operation
      description: "The SDK-facing native secrets plane. A single RPC endpoint: the body is a signed Envelope (ML-DSA-65 over\
        \ the request), and the OPERATION is the signed `op` field \u2014 never the URL. Authorization is consensus-native:\
        \ the caller's mnemonic-derived NodeID must be in the validator authority (reads: OpSecretGet 0x0040, OpSecretList\
        \ 0x0042, OpVerify 0x0051) and, for writes (OpSecretPut 0x0041 \u2014 also the rotate op, OpSecretDelete 0x0043, OpSign\
        \ 0x0050), additionally in the operator authority. Every envelope is verified for signature, wall-clock freshness\
        \ (\xB15m), and replay (per-(NodeID,nonce) ledger) before dispatch. There is NO bearer token on this surface \u2014\
        \ the ML-DSA-65 envelope IS the credential.\n"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/kms_SdkEnvelope'
      responses:
        '200':
          description: Operation result (shape depends on the signed op).
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Malformed envelope, unsupported version/scheme, or bad inner request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/kms_Error'
        '403':
          description: "Forbidden \u2014 bad signature, stale timestamp, replayed nonce, or the identity is not authorized\
            \ for the signed op. Replay is masked as a generic \"forbidden\" so the nonce ledger is unprobeable.\n"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/kms_Error'
        '404':
          description: Secret not found.
        '413':
          description: Envelope exceeds the 4 MiB cap.
        '500':
          description: Internal error (no internal detail is leaked to the client).
