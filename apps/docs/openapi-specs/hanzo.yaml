      type: object
      properties:
        status:
          type: string
          enum:
          - running
          - paused
          - done
          - error
        title:
          type: string
    cloud_agents.RegisterSessionRequest:
      title: RegisterSessionRequest
      type: object
      required:
      - agent
      properties:
        agent:
          type: string
        actor:
          type: string
          description: Defaults to the validated principal when omitted.
        title:
          type: string
        status:
          type: string
          enum:
          - running
          - paused
          - done
          - error
          description: Defaults to running.
        parentSessionId:
          type: string
          description: Links this session as a subagent child of an existing same-org session (inherits its rootSessionId).
        taskWorkflowId:
          type: string
        taskRunId:
          type: string
    cloud_agents.Run:
      title: Run
      type: object
      description: "One execution of an agent \u2014 the input, produced output (or error), the model that served it, and\
        \ duration. Every row is a call that happened."
      properties:
        id:
          type: string
        status:
          type: string
          description: ok or error.
        model:
          type: string
        input:
          type: string
        output:
          type: string
        error:
          type: string
        durationMs:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
    cloud_agents.RunRequest:
      title: RunRequest
      type: object
      properties:
        input:
          type: string
          description: Caller input appended to the agent's instructions (max 128 KiB).
    cloud_agents.Session:
      title: Session
      type: object
      description: "A live agent-session \u2014 a running invocation (cloud run, bot loop, or a @hanzo/dev CLI run spawning\
        \ subagents). Sessions linked by parentSessionId form the subagent tree; rootSessionId is the shared tree key."
      properties:
        id:
          type: string
          description: Session id (sess_...).
        agent:
          type: string
          description: Agent name/type label (need not be a cloud Agent row).
        actor:
          type: string
          description: The principal that started it.
        status:
          type: string
          enum:
          - running
          - paused
          - done
          - error
        parentSessionId:
          type: string
          description: Empty for a root (the outer agent).
        rootSessionId:
          type: string
          description: The tree key; equals id for a root.
        title:
          type: string
        taskWorkflowId:
          type: string
          description: The hanzoai/tasks workflow that executes this session, when task-backed.
        taskRunId:
          type: string
        events:
          type: integer
        children:
          type: integer
          description: Direct-child (subagent) fan-out count.
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          description: Set once a terminal status (done/error) is reached.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    cloud_agents.SessionDetail:
      title: SessionDetail
      type: object
      allOf:
      - $ref: '#/components/schemas/cloud_agents.Session'
      - type: object
        properties:
          childSessions:
