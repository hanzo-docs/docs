        data_out:
          type: integer
          format: int64
          description: Total bytes sent.
        slow_consumers:
          type: integer
          description: Number of slow consumers.
        streams:
          type: integer
          description: Number of JetStream streams.
        consumers:
          type: integer
          description: Number of JetStream consumers.
        limits:
          $ref: '#/components/schemas/mq_AccountLimits'
    mq_AccountLimits:
      type: object
