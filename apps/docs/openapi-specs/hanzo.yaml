      - observe_Status
      summary: Live health status for a product
      description: 'Returns a live health signal for a product: an in-cluster health probe

        (measured latency, `/health` then `/healthz`) corroborated by the

        VictoriaMetrics `up{service}` scrape gauge. `up` is set by the probe when

        it succeeds, else by the scrape gauge, else false. Status is infra-level

        (no per-org data) but still requires a validated principal.

        '
      operationId: observe_getStatus
      parameters:
      - name: product
        in: query
        required: true
        description: Console product slug. Must match `^[a-z0-9][a-z0-9._-]{0,62}$`.
        schema:
          type: string
          pattern: ^[a-z0-9][a-z0-9._-]{0,62}$
      responses:
        '200':
          description: Health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observe_StatusResponse'
        '400':
          $ref: '#/components/responses/observe_BadRequest'
        '401':
          $ref: '#/components/responses/observe_Unauthorized'
        '403':
          $ref: '#/components/responses/observe_Forbidden'
