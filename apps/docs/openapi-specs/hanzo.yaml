      description: 'Returns every policy rule for the calling org as an array of

        `[sub, obj, act]` tuples. Scoped by the gateway-minted `X-Org-Id`

        header.

        '
      operationId: authz_authzListPolicies
      responses:
        '200':
          description: The org's policy set.
          content:
