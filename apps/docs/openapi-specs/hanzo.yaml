          description: Object name.
        description:
          type: string
          description: Optional description.
        size:
          type: integer
          format: int64
          description: Object size in bytes.
        chunks:
          type: integer
          description: Number of chunks.
        digest:
          type: string
          description: SHA-256 digest of the object.
        modified:
          type: string
          format: date-time
          description: Last modification timestamp.
        deleted:
          type: boolean
          description: True if the object has been deleted.
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Optional metadata headers.
    mq_ObjectStoreConfig:
      type: object
      description: Object store creation configuration.
      properties:
        name:
          type: string
          description: Store name.
          pattern: ^[a-zA-Z0-9_-]+$
          maxLength: 256
        max_chunk_size:
          type: integer
          format: int32
          default: 131072
          description: Maximum chunk size in bytes (default 128KB).
        max_bytes:
          type: integer
          format: int64
          default: -1
          description: Maximum total store size (-1 for unlimited).
        storage:
          type: string
          enum:
          - file
          - memory
          default: file
          description: Storage backend.
        num_replicas:
          type: integer
          minimum: 1
          maximum: 5
          default: 1
          description: Number of replicas.
        description:
          type: string
          description: Optional human-readable description.
      required:
      - name
    mq_ObjectStoreInfo:
      type: object
      description: Object store metadata.
      properties:
        name:
          type: string
        config:
          $ref: '#/components/schemas/mq_ObjectStoreConfig'
        size:
          type: integer
          format: uint64
          description: Total bytes used.
        objects:
          type: integer
          description: Number of objects in the store.
        chunks:
          type: integer
          description: Total number of chunks across all objects.
        backing_stream:
          type: string
          description: Name of the underlying JetStream stream.
        created:
          type: string
          format: date-time
    mq_PublishRequest:
      type: object
      description: Request body for publishing a message.
      properties:
        subject:
          type: string
          description: Target subject.
        data:
          type: string
          description: Message payload (base64-encoded for binary data).
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Optional message headers.
        reply:
          type: string
          description: Optional reply-to subject.
      required:
      - subject
      - data
    mq_PublishResponse:
      type: object
      description: Response after publishing a message.
      properties:
        stream:
          type: string
          description: 'Stream name if the subject is bound to a JetStream stream.

            Absent for core NATS subjects.

            '
        sequence:
          type: integer
          format: uint64
          description: 'Stream sequence number. Present only for JetStream-bound

            subjects.

            '
        duplicate:
          type: boolean
          description: True if the message was a duplicate (dedup window).
    mq_RequestReply:
      type: object
      description: Request body for the request/reply pattern.
      properties:
        subject:
          type: string
          description: Target subject.
        data:
          type: string
          description: Request payload (base64-encoded for binary data).
        timeout:
          type: string
          description: 'Maximum time to wait for a reply (e.g., "5s", "30s").

            Defaults to "10s".

            '
          default: 10s
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Optional message headers.
      required:
