    mq_Account:
      type: object
      description: 'Multi-tenant account mapped to a Hanzo IAM organization. All

        resources (streams, consumers, buckets) are scoped to the account.

        '
      properties:
        id:
          type: string
          description: Account ID.
        org_id:
          type: string
          description: Hanzo IAM organization ID.
        name:
          type: string
          description: Account display name.
        connections:
          type: integer
          description: Number of active connections.
        subscriptions:
          type: integer
          description: Number of active subscriptions.
        data_in:
          type: integer
          format: int64
          description: Total bytes received.
        data_out:
          type: integer
          format: int64
          description: Total bytes sent.
        slow_consumers:
          type: integer
          description: Number of slow consumers.
        streams:
          type: integer
          description: Number of JetStream streams.
        consumers:
          type: integer
          description: Number of JetStream consumers.
        limits:
          $ref: '#/components/schemas/mq_AccountLimits'
    mq_AccountLimits:
      type: object
      description: Resource limits for the account.
      properties:
        max_connections:
          type: integer
          description: Maximum concurrent connections.
        max_subscriptions:
          type: integer
          description: Maximum subscriptions.
        max_payload:
          type: integer
          description: Maximum message payload size in bytes.
        max_streams:
          type: integer
          description: Maximum JetStream streams.
        max_consumers:
          type: integer
          description: Maximum JetStream consumers.
        max_bytes:
          type: integer
          format: int64
          description: Maximum total JetStream storage in bytes.
    mq_Connection:
      type: object
      description: An active client connection to the MQ server.
      properties:
        id:
          type: integer
          format: uint64
          description: Connection ID.
        name:
          type: string
          description: Client-supplied connection name.
        ip:
          type: string
          description: Client IP address.
        port:
          type: integer
          description: Client port.
        lang:
          type: string
          description: Client library language.
        version:
          type: string
          description: Client library version.
        subscriptions:
          type: integer
          description: Number of subscriptions on this connection.
        in_msgs:
          type: integer
          format: int64
          description: Messages received.
        out_msgs:
          type: integer
          format: int64
          description: Messages sent.
        in_bytes:
          type: integer
          format: int64
          description: Bytes received.
        out_bytes:
          type: integer
          format: int64
          description: Bytes sent.
        uptime:
          type: string
          description: Connection uptime.
        idle:
          type: string
          description: Time since last activity.
        started:
          type: string
          format: date-time
          description: Connection start time.
        tls_version:
          type: string
          description: TLS version (if TLS is active).
    mq_Consumer:
      type: object
      description: A JetStream consumer with configuration and delivery state.
      properties:
        name:
          type: string
        stream_name:
          type: string
        config:
          $ref: '#/components/schemas/mq_ConsumerConfig'
        delivered:
          $ref: '#/components/schemas/mq_SequencePair'
        ack_floor:
          $ref: '#/components/schemas/mq_SequencePair'
        num_pending:
          type: integer
          format: uint64
          description: Messages waiting to be delivered.
        num_redelivered:
          type: integer
          description: Messages currently being redelivered.
        num_waiting:
          type: integer
          description: Pull requests waiting for messages.
        num_ack_pending:
          type: integer
          description: Messages delivered but not yet acknowledged.
        created:
          type: string
          format: date-time
    mq_ConsumerConfig:
      type: object
      description: JetStream consumer configuration.
      properties:
        durable_name:
          type: string
          description: 'Durable consumer name. If set, the consumer survives client

            disconnections.

            '
          pattern: ^[a-zA-Z0-9_-]+$
          maxLength: 256
        filter_subject:
          type: string
          description: 'Subject filter. Only messages matching this subject are

            delivered. Supports wildcards.

            '
        ack_policy:
          type: string
          enum:
          - none
          - all
          - explicit
          default: explicit
          description: 'Acknowledgment policy. `explicit` requires per-message ack.

            `all` acks all messages up to the acked sequence. `none`

            disables acks.

            '
        deliver_policy:
          type: string
          enum:
          - all
          - last
          - new
          - by_start_sequence
          - by_start_time
          - last_per_subject
          default: all
          description: 'Where to start delivery. `all` delivers from the beginning.

            `last` delivers the last message. `new` delivers only new

            messages. `by_start_sequence` and `by_start_time` start from

            a specific point.

            '
        opt_start_seq:
          type: integer
          format: uint64
          description: 'Starting sequence number (used with deliver_policy

            `by_start_sequence`).

            '
        opt_start_time:
          type: string
          format: date-time
          description: 'Starting timestamp (used with deliver_policy `by_start_time`).

            '
        max_deliver:
          type: integer
          default: -1
          description: 'Maximum delivery attempts before the message is dropped or

            sent to a dead letter subject (-1 for unlimited).

            '
        ack_wait:
          type: string
          description: 'Time to wait for acknowledgment before redelivery

            (e.g., "30s", "5m"). Defaults to "30s".

            '
          default: 30s
        replay_policy:
          type: string
          enum:
          - instant
          - original
          default: instant
          description: 'Replay policy for historical messages. `instant` delivers as

            fast as possible. `original` preserves original timing gaps.

            '
        max_ack_pending:
          type: integer
          default: 1000
          description: 'Maximum number of unacknowledged messages before delivery

            pauses.

            '
        description:
          type: string
          description: Optional human-readable description.
    mq_Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        code:
          type: integer
          description: HTTP status code.
        detail:
          type: string
          description: Additional error details.
      required:
      - error
      - code
    mq_KVBucket:
      type: object
      description: A NATS KV bucket with configuration and state.
      properties:
        name:
          type: string
        config:
          $ref: '#/components/schemas/mq_KVBucketConfig'
        values:
          type: integer
          format: uint64
          description: Number of keys in the bucket.
        bytes:
          type: integer
          format: uint64
          description: Total bytes used.
        history:
          type: integer
          description: Maximum revisions per key.
        ttl:
          type: string
          description: Default TTL for keys.
        backing_stream:
          type: string
          description: Name of the underlying JetStream stream.
        created:
          type: string
          format: date-time
    mq_KVBucketConfig:
      type: object
      description: KV bucket creation configuration.
      properties:
        name:
          type: string
          description: Bucket name.
          pattern: ^[a-zA-Z0-9_-]+$
          maxLength: 256
        history:
          type: integer
          minimum: 1
          maximum: 64
          default: 1
          description: Maximum number of revisions per key.
        ttl:
          type: string
          description: 'Default TTL for keys (e.g., "1h", "7d", "0" for no expiry).

            '
          default: '0'
        max_value_size:
          type: integer
          format: int32
          default: -1
          description: Maximum value size in bytes (-1 for default).
        max_bytes:
          type: integer
          format: int64
          default: -1
          description: Maximum total bucket size (-1 for unlimited).
        storage:
          type: string
          enum:
          - file
          - memory
          default: file
          description: Storage backend.
        num_replicas:
          type: integer
          minimum: 1
          maximum: 5
          default: 1
          description: Number of replicas.
        description:
          type: string
          description: Optional human-readable description.
      required:
      - name
    mq_KVEntry:
      type: object
      description: A key-value entry with revision metadata.
      properties:
        key:
          type: string
          description: Key name.
        value:
          type: string
          description: Value (base64-encoded for binary data).
        revision:
          type: integer
          format: uint64
          description: Revision number.
        created:
          type: string
          format: date-time
          description: Timestamp of this revision.
        operation:
          type: string
          enum:
          - put
          - delete
          - purge
          description: 'Operation that produced this revision. `delete` is a

            tombstone. `purge` removes all prior revisions.

            '
        bucket:
          type: string
          description: Bucket name.
        delta:
          type: integer
          format: uint64
          description: 'Number of revisions since this entry (for watch operations).

            '
    mq_Message:
