      parameters:
      - $ref: '#/components/parameters/mq_BucketName'
      - name: filter
        in: query
        schema:
          type: string
        description: Key filter pattern (supports wildcards).
      - $ref: '#/components/parameters/mq_LimitParam'
      - $ref: '#/components/parameters/mq_OffsetParam'
      responses:
        '200':
