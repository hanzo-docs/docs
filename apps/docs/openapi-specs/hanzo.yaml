  /v1/agents/metrics:
    get:
      tags:
      - cloud_Agents API
      description: Invocations-over-time histogram for the org's Agents dashboard. Every point is a real count of recorded
        runs in that bucket, one series line per agent that ran in the window. The Resource Usage rollup is all-null (this
        store meters no CPU/memory/storage/cost).
      operationId: cloud_AgentsController.Metrics
      parameters:
      - in: query
        name: range
        description: Window token; one of 24H, 7D, 30D (default 30D).
        required: false
        schema:
          type: string
          enum:
          - 24H
          - 7D
          - 30D
      responses:
        '200':
          description: The metrics view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Metrics'
  /v1/agents/sessions:
    post:
      tags:
      - cloud_Agent Sessions API
      description: "Register a live agent session. With no parentSessionId the session is a root (the outer agent); with one\
        \ it is a subagent child of that parent (which must exist in the same org) and inherits its rootSessionId \u2014 the\
        \ tree key every node in one flow shares."
      operationId: cloud_AgentSessionsController.Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.RegisterSessionRequest'
      responses:
        '201':
          description: The registered session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Session'
        '400':
          description: Missing agent, invalid status, or parentSessionId not found in this org.
    get:
      tags:
      - cloud_Agent Sessions API
      description: List the org's live sessions, newest first. With no filter only roots (the outer-agent view) are returned;
        root scopes to one tree, parent to a session's direct children.
      operationId: cloud_AgentSessionsController.List
      parameters:
      - in: query
        name: root
        description: Return every session in this tree (rootSessionId == root).
        required: false
        schema:
          type: string
      - in: query
        name: parent
        description: Return the direct children of this session.
        required: false
        schema:
          type: string
      - in: query
        name: status
        description: Filter by status.
        required: false
        schema:
          type: string
          enum:
          - running
          - paused
          - done
          - error
      - in: query
        name: limit
        description: Max sessions to return (default 100, max 500).
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: The matching sessions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/cloud_agents.Session'
        '400':
          description: Invalid status filter.
  /v1/agents/sessions/stream:
    get:
      tags:
      - cloud_Agent Sessions API
      description: Server-Sent Events feed of live session + event updates for the caller's org (streams natively over the
        ZAP machine transport as well). Optional ?root scopes the feed to one subagent tree. Each frame carries an event type
        (session or event) and a JSON data line; the GET list/detail/tree endpoints remain the source of truth, the stream
        is a live hint.
      operationId: cloud_AgentSessionsController.Stream
      parameters:
      - in: query
        name: root
        description: Scope the feed to one subagent tree (rootSessionId).
        required: false
        schema:
          type: string
      responses:
        '200':
          description: An open SSE stream of session and event frames.
          content:
            text/event-stream:
              schema:
                type: string
  /v1/agents/sessions/{id}:
    get:
      tags:
      - cloud_Agent Sessions API
      description: "Session detail \u2014 the session, its direct child sessions, and up to 50 recent events."
      operationId: cloud_AgentSessionsController.Get
      parameters:
      - in: path
        name: id
        description: The session id (sess_...).
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The session detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.SessionDetail'
        '404':
          description: No such session in this org.
    patch:
      tags:
      - cloud_Agent Sessions API
      description: "Update a session's status and/or title. A terminal session (done/error) is monotonic \u2014 it cannot\
        \ be reopened."
      operationId: cloud_AgentSessionsController.Patch
      parameters:
      - in: path
        name: id
        description: The session id (sess_...).
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.PatchSessionRequest'
      responses:
        '200':
          description: The updated session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Session'
        '400':
          description: Invalid status or title.
        '404':
          description: No such session in this org.
        '409':
          description: The session is already finished; its status cannot change.
  /v1/agents/sessions/{id}/events:
    post:
      tags:
      - cloud_Agent Sessions API
      description: Append one event to a session's ordered log (a model message, tool call, subagent spawn, free log line,
        status change, or control command). Seq is allocated monotonically per session. The payload is an opaque, size-bounded,
        well-formed JSON blob.
      operationId: cloud_AgentSessionsController.AppendEvent
      parameters:
      - in: path
        name: id
        description: The session id (sess_...).
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.EventRequest'
      responses:
        '201':
          description: The appended event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.Event'
        '400':
          description: Invalid kind or payload.
        '404':
          description: No such session in this org.
  /v1/agents/sessions/{id}/message:
    post:
      tags:
      - cloud_Agent Sessions API
      description: Send a steering message to a live session. Requires a 'message' or 'payload'. Records a durable control
        event and forwards to the tasks engine when the session is task-backed.
      operationId: cloud_AgentSessionsController.Message
      parameters:
      - in: path
        name: id
        description: The session id (sess_...).
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.ControlRequest'
      responses:
        '200':
          description: The recorded control command.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.ControlResult'
        '400':
          description: A message or payload is required.
        '404':
          description: No such session in this org.
        '409':
          description: The session is finished; a finished session cannot be steered.
        '502':
          description: Control recorded but the tasks-engine forward failed.
  /v1/agents/sessions/{id}/pause:
    post:
      tags:
      - cloud_Agent Sessions API
      description: Pause a live session. Records a durable control event and, when the session is backed by a hanzoai/tasks
        workflow and a tasks backend is wired, forwards the command to the engine's signal API.
      operationId: cloud_AgentSessionsController.Pause
      parameters:
      - in: path
        name: id
        description: The session id (sess_...).
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.ControlRequest'
      responses:
        '200':
          description: The recorded control command.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.ControlResult'
        '404':
          description: No such session in this org.
        '409':
          description: The session is finished; a finished session cannot be steered.
        '502':
          description: Control recorded but the tasks-engine forward failed.
  /v1/agents/sessions/{id}/resume:
    post:
      tags:
