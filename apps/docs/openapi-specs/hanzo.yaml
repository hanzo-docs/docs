      responses:
        '200':
          description: The recorded control command.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.ControlResult'
        '404':
          description: No such session in this org.
        '409':
          description: The session is finished; a finished session cannot be steered.
        '502':
          description: Control recorded but the tasks-engine forward failed.
  /v1/agents/sessions/{id}/stop:
    post:
      tags:
      - cloud_Agent Sessions API
      description: Stop a session. Records a durable control event and, when task-backed, cancels the underlying hanzoai/tasks
        workflow.
      operationId: cloud_AgentSessionsController.Stop
      parameters:
      - in: path
        name: id
        description: The session id (sess_...).
        required: true
