  /v1/affiliates:
    get:
      tags:
      - affiliates_Affiliate
      summary: Get my affiliate status
      description: 'Returns the caller org''s affiliate dashboard. If the org is not enrolled,

        returns an honest "not enrolled" shape (`isAffiliate: false`) so the console

        can show the apply form. For an APPROVED affiliate it also opportunistically

        runs the accrual sweep over the org''s own referred orgs (bounded,

        best-effort), so the dashboard is self-updating.

        '
      operationId: affiliates_getMyAffiliate
      responses:
        '200':
          description: The affiliate dashboard, or a not-enrolled shape.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/affiliates_NotEnrolled'
                - $ref: '#/components/schemas/affiliates_AffiliateDashboard'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
  /v1/affiliates/apply:
    post:
      tags:
      - affiliates_Affiliate
      summary: Apply to the affiliate program
      description: 'Enrolls the caller org as an affiliate at `status=applied`. Idempotent (one

        affiliate per org, first apply wins). A malformed vanity code is refused.

        Returns `201` on first creation, `200` if the org was already enrolled.

        '
      operationId: affiliates_applyAffiliate
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/affiliates_ApplyRequest'
      responses:
        '200':
          description: Already enrolled (idempotent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_ApplyResponse'
        '201':
          description: Newly enrolled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_ApplyResponse'
        '400':
          $ref: '#/components/responses/affiliates_BadRequest'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
  /v1/affiliates/attribute:
    post:
      tags:
      - affiliates_Affiliate
      summary: Record affiliate attribution
      description: "Records an affiliate\u2194referred-org edge. The REFERRED org is the validated\ncaller (never client-supplied);\
        \ the affiliate is resolved from `code`\n(approved affiliates only). Idempotent (one per referred org, first-touch\n\
        wins); self-attribution is blocked; an unknown code is rejected. Returns\n`201` on first attribution, `200` if already\
        \ attributed.\n"
      operationId: affiliates_attributeAffiliate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/affiliates_AttributeRequest'
      responses:
        '200':
          description: Already attributed (idempotent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_AttributeResponse'
        '201':
          description: Attribution recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_AttributeResponse'
        '400':
          $ref: '#/components/responses/affiliates_BadRequest'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '404':
          $ref: '#/components/responses/affiliates_NotFound'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
