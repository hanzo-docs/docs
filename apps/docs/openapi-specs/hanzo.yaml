  /v1/notify/send:
    post:
      operationId: notify_notifySend
      tags:
      - notify_Send
      summary: Send a notification (generic channel)
      description: "Synchronously delivers a notification. The channel is read from the\nrequest body (`channel: \"sms\"|\"\
        email\"`). Only `sms` and `email` are\nsupported by the cloud fold.\n\n`sync=true` is REQUIRED. Without it the request\
        \ fails closed with `503`\n(async dispatch is not available in the fold).\n\nThe org scope is taken from the validated\
        \ principal's tenant, never from\na client-supplied header. The provider is chosen from configured KMS\ncredentials\
        \ unless `provider` pins one explicitly.\n\nRESPONSE SHAPE \u2014 for a single recipient the body is a bare\n`SendResponse`.\
        \ For multiple recipients the body is\n`{\"items\": [SendResponse, ...]}`, one entry per recipient. A per-recipient\n\
        terminal delivery failure is reported as a `200` with `status: \"failed\"`\nand an `error` message, NOT as an HTTP\
        \ error.\n"
      parameters:
      - name: sync
        in: query
        required: true
        description: 'Must be `true`. Async dispatch is not available in the cloud fold; any

          other value yields `503`.

          '
        schema:
          type: string
          enum:
          - true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/notify_SendRequest'
            examples:
              iamOtpSms:
                summary: IAM OTP over SMS (the live contract)
                value:
                  to:
                  - '+15551234567'
                  channel: sms
                  event: iam.otp_sent
                  template_vars:
                    otp: '482913'
                    recipient: '+15551234567'
                    app: Hanzo
              rawEmail:
                summary: Raw-body email (no template)
                value:
                  to:
                  - user@example.com
                  channel: email
                  subject: Welcome
                  body: Thanks for signing up.
      responses:
        '200':
          description: 'Delivery attempted. Single recipient returns a bare `SendResponse`;

            multiple recipients return an items wrapper. A `status` of `failed`

            with a populated `error` is a per-recipient terminal failure, still

            returned as `200`.

            '
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/notify_SendResponse'
                - $ref: '#/components/schemas/notify_SendResponseList'
              examples:
                sent:
                  summary: Single recipient, sent
                  value:
                    message_id: 4f3c2a1b9e8d7c6b5a4f3e2d1c0b9a88
                    status: sent
                failed:
                  summary: Single recipient, terminal failure
                  value:
                    message_id: 4f3c2a1b9e8d7c6b5a4f3e2d1c0b9a88
                    status: failed
                    error: 'notify: no SMS provider configured for org "acme"'
        '400':
          $ref: '#/components/responses/notify_BadRequest'
        '401':
          $ref: '#/components/responses/notify_Unauthorized'
        '503':
          $ref: '#/components/responses/notify_ServiceUnavailable'
  /v1/notify/send/email:
    post:
      operationId: notify_notifySendEmail
      tags:
      - notify_Send
      summary: Send an email notification
      description: "Convenience route that pins `channel: email`. Any `channel` in the body\nis overridden. Otherwise identical\
        \ to `POST /v1/notify/send` \u2014\n`sync=true` required, org derived from the validated principal, single\nvs. list\
        \ response shape.\n"
      parameters:
      - name: sync
        in: query
        required: true
        description: Must be `true`; otherwise `503`.
        schema:
          type: string
          enum:
          - true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/notify_SendRequest'
            example:
              to:
              - user@example.com
              subject: Welcome
              body: Thanks for signing up.
      responses:
        '200':
          description: Delivery attempted. See `POST /v1/notify/send`.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/notify_SendResponse'
                - $ref: '#/components/schemas/notify_SendResponseList'
        '400':
          $ref: '#/components/responses/notify_BadRequest'
        '401':
          $ref: '#/components/responses/notify_Unauthorized'
        '503':
          $ref: '#/components/responses/notify_ServiceUnavailable'
