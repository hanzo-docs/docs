  /v1/integrations/{provider}/callback:
    parameters:
    - name: provider
      in: path
      required: true
      schema:
        type: string
    get:
      tags:
      - integrations_OAuth
      summary: "OAuth return \u2014 seal tokens and redirect to console"
      operationId: integrations_providerCallback
      description: Public, state-authed. The org comes only from the signed, single-use state. Always 302s back to the console
        (success or labeled failure).
      security: []
      parameters:
      - name: state
        in: query
        required: true
        schema:
          type: string
      - name: code
        in: query
        schema:
          type: string
      - name: error
        in: query
        schema:
          type: string
      responses:
        '302':
          description: Redirect to console (connected or error)
  /v1/integrations/{provider}/connect:
    parameters:
    - name: provider
      in: path
      required: true
      schema:
        type: string
    post:
      tags:
      - integrations_OAuth
      summary: Begin an OAuth flow (returns the provider authorize URL)
      operationId: integrations_connectProvider
      responses:
        '200':
          description: Authorize URL
          content:
            application/json:
              schema:
