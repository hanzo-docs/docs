  /v1/mq/objects/{store}/{name}:
    get:
      operationId: mq_getObject
      summary: Download object
      description: 'Downloads the object as a binary stream. Chunks are reassembled

        transparently.

        '
      tags:
      - mq_ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      - $ref: '#/components/parameters/mq_ObjectName'
      responses:
        '200':
          description: Object binary data
          headers:
            X-MQ-Object-Size:
              schema:
                type: integer
                format: int64
              description: Total object size in bytes.
            X-MQ-Object-Chunks:
              schema:
                type: integer
              description: Number of chunks.
            X-MQ-Object-Digest:
              schema:
                type: string
              description: SHA-256 digest of the object.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    put:
      operationId: mq_putObject
      summary: Upload object
      description: 'Uploads an object to the store. The object is automatically chunked

        for storage. Use multipart/form-data for file uploads or

        application/octet-stream for raw binary.

        '
      tags:
      - mq_ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      - $ref: '#/components/parameters/mq_ObjectName'
      - name: X-MQ-Object-Description
        in: header
        schema:
          type: string
        description: Optional description for the object.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        '200':
          description: Object stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_ObjectInfo'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          description: Store not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '413':
          description: Object exceeds max_bytes limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
    delete:
      operationId: mq_deleteObject
      summary: Delete object
      description: Deletes the object and its chunks from the store.
      tags:
      - mq_ObjectStore
      parameters:
      - $ref: '#/components/parameters/mq_StoreName'
      - $ref: '#/components/parameters/mq_ObjectName'
      responses:
        '204':
          description: Object deleted
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/publish:
    post:
      operationId: mq_publishMessage
      summary: Publish message to subject
      description: 'Publish a message to the specified subject. Supports optional headers

        and reply-to subject for request/reply patterns. If the subject is

        bound to a JetStream stream, the message is persisted.

        '
      tags:
      - mq_Publish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_PublishRequest'
      responses:
        '200':
          description: Message published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_PublishResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '503':
          description: No responders for subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/request:
    post:
      operationId: mq_requestReply
      summary: Request/reply pattern
      description: 'Publishes a message and waits for a single reply within the specified

        timeout. Uses an ephemeral inbox subject for the reply. Returns the

        reply message or a timeout error.

        '
      tags:
      - mq_Publish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_RequestReply'
      responses:
        '200':
          description: Reply received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Message'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '408':
          description: Request timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/streams:
    get:
      operationId: mq_listStreams
      summary: List streams
      description: Returns all JetStream streams for the authenticated account.
      tags:
      - mq_Streams
      parameters:
      - $ref: '#/components/parameters/mq_LimitParam'
      - $ref: '#/components/parameters/mq_OffsetParam'
      responses:
        '200':
          description: List of streams
          content:
            application/json:
              schema:
                type: object
                properties:
                  streams:
                    type: array
                    items:
                      $ref: '#/components/schemas/mq_Stream'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
    post:
      operationId: mq_createStream
      summary: Create stream
      description: 'Creates a new JetStream stream with the specified configuration.

        Streams provide durable, replicated message storage with configurable

        retention policies.

        '
      tags:
      - mq_Streams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_StreamConfig'
      responses:
        '201':
          description: Stream created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Stream'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '409':
          description: Stream already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/streams/{name}:
    get:
      operationId: mq_getStream
      summary: Get stream info
      description: 'Returns stream configuration and current state including message

        count, byte size, and consumer count.

        '
      tags:
      - mq_Streams
      parameters:
      - $ref: '#/components/parameters/mq_StreamName'
      responses:
        '200':
          description: Stream info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Stream'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    put:
      operationId: mq_updateStream
      summary: Update stream config
      description: 'Updates an existing stream''s configuration. Not all fields are

        mutable after creation (e.g., storage type cannot change).

        '
      tags:
      - mq_Streams
      parameters:
      - $ref: '#/components/parameters/mq_StreamName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_StreamConfig'
      responses:
        '200':
          description: Stream updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Stream'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    delete:
      operationId: mq_deleteStream
      summary: Delete stream
      description: 'Deletes a stream and all its messages and consumers. This operation

        is irreversible.

        '
      tags:
      - mq_Streams
      parameters:
      - $ref: '#/components/parameters/mq_StreamName'
      responses:
        '204':
          description: Stream deleted
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/streams/{name}/messages:
    get:
      operationId: mq_getStreamMessages
      summary: Get stream messages
      description: 'Retrieves messages from the stream by sequence number or subject.

        Use for direct message access without a consumer.

        '
      tags:
      - mq_Streams
      parameters:
      - $ref: '#/components/parameters/mq_StreamName'
      - name: seq
        in: query
        schema:
          type: integer
          format: uint64
        description: Get message at this sequence number.
      - name: last_by_subject
        in: query
        schema:
          type: string
        description: Get last message for the given subject.
      - name: next_by_subject
        in: query
        schema:
          type: string
        description: 'Get next message for the given subject (requires seq param

          as starting point).

          '
      - $ref: '#/components/parameters/mq_LimitParam'
      responses:
        '200':
          description: Stream messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/mq_StreamMessage'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/streams/{name}/messages/{seq}:
    delete:
      operationId: mq_deleteStreamMessage
      summary: Delete specific message
      description: 'Deletes a specific message from the stream by sequence number.

        The sequence gap remains; subsequent messages are not renumbered.

        '
      tags:
      - mq_Streams
      parameters:
      - $ref: '#/components/parameters/mq_StreamName'
      - name: seq
        in: path
        required: true
        schema:
          type: integer
          format: uint64
        description: Message sequence number.
      responses:
        '204':
          description: Message deleted
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/streams/{name}/purge:
    post:
      operationId: mq_purgeStream
      summary: Purge stream messages
      description: 'Removes all messages from the stream. Consumers are not deleted.

        Optionally filter by subject to purge only matching messages.

        '
      tags:
      - mq_Streams
      parameters:
      - $ref: '#/components/parameters/mq_StreamName'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  type: string
                  description: Subject filter to purge only matching messages.
                keep:
                  type: integer
                  description: Number of messages to keep (from the end).
      responses:
        '200':
          description: Stream purged
          content:
            application/json:
              schema:
                type: object
                properties:
                  purged:
                    type: integer
                    description: Number of messages purged.
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/streams/{stream}/consumers:
    get:
      operationId: mq_listConsumers
      summary: List consumers
      description: Returns all consumers for the specified stream.
      tags:
      - mq_Consumers
      parameters:
      - $ref: '#/components/parameters/mq_StreamNamePath'
      - $ref: '#/components/parameters/mq_LimitParam'
      - $ref: '#/components/parameters/mq_OffsetParam'
      responses:
        '200':
          description: List of consumers
          content:
