        '500':
          $ref: '#/components/responses/projects_InternalServerError'
  /v1/projects/{slug}/deployments/{id}/complete:
    parameters:
    - $ref: '#/components/parameters/projects_Slug'
    - $ref: '#/components/parameters/projects_DeploymentId'
    post:
      tags:
      - projects_Deployments
      summary: CI completion hook for a git deployment
      description: 'After CI syncs the built site to S3 it flips the queued deployment to

        `live` (or `error`). `status` must be `live` or `error`. When `liveUrl`

        is omitted on a live completion it defaults to the project''s S3 live URL.

        '
      operationId: projects_completeDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/projects_CompleteDeploymentRequest'
      responses:
        '200':
          description: The updated deployment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects_Deployment'
        '400':
          $ref: '#/components/responses/projects_BadRequest'
        '403':
