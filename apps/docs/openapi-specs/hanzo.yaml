  /v1/mq/subscribe/{subject}:
    get:
      operationId: mq_subscribe
      summary: Subscribe to subject via SSE
      description: 'Opens a Server-Sent Events stream for messages on the given subject.

        Supports NATS wildcard tokens: `*` matches a single token, `>`

        matches one or more tokens. The connection stays open until the

        client disconnects.

        '
      tags:
      - mq_Subscribe
      parameters:
      - name: subject
        in: path
        required: true
        schema:
          type: string
        description: 'Subject to subscribe to. Supports wildcards (`events.*`,

          `logs.>`).

          '
      - name: queue
        in: query
        schema:
          type: string
        description: Queue group name for load-balanced delivery.
      responses:
        '200':
          description: SSE stream of messages
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/mq_Message'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
