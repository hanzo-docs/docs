          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
    delete:
      operationId: mq_deleteConsumer
      summary: Delete consumer
      description: 'Deletes a consumer and its delivery state. Unacknowledged messages

        remain in the stream.

        '
      tags:
      - mq_Consumers
      parameters:
      - $ref: '#/components/parameters/mq_StreamNamePath'
      - $ref: '#/components/parameters/mq_ConsumerName'
      responses:
        '204':
          description: Consumer deleted
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
  /v1/mq/streams/{stream}/consumers/{name}/next:
    post:
      operationId: mq_pullMessages
      summary: Pull next message(s)
      description: 'Pulls the next batch of messages from the consumer. Supports

        configurable batch size, timeout, and no-wait mode.

        '
      tags:
      - mq_Consumers
      parameters:
      - $ref: '#/components/parameters/mq_StreamNamePath'
      - $ref: '#/components/parameters/mq_ConsumerName'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                batch:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 1
                  description: Number of messages to pull.
                expires:
                  type: string
                  description: 'Maximum time to wait for messages (e.g., "5s", "30s").

                    Defaults to 30s.

                    '
                no_wait:
                  type: boolean
                  default: false
                  description: 'Return immediately if no messages are available instead

                    of waiting.

                    '
      responses:
        '200':
          description: Messages pulled
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/mq_StreamMessage'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          $ref: '#/components/responses/mq_NotFound'
        '408':
          description: Request expired with no messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/subjects:
