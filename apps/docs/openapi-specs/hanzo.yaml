        stored.
      tags:
      - pubsub_Publish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pubsub_PublishRequest'
            examples:
              basic:
                summary: Basic publish
                value:
                  subject: orders.created
                  data: '{"id":"order-123","total":59.99}'
              withHeaders:
                summary: Publish with dedup header
                value:
                  subject: orders.created
                  data: '{"id":"order-123"}'
                  headers:
                    Msg-Id: order-123
      responses:
        '200':
          description: Message published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pubsub_PublishResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pubsub_Error'
