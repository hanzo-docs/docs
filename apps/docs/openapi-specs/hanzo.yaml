        name:
          type: string
          description: Org-unique name matching ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$.
        model:
          type: string
        instructions:
          type: string
          description: System prompt (max 32 KiB).
        description:
          type: string
        tools:
          type: array
          items:
            type: string
        executionMode:
          type: string
          enum:
          - one-shot
          - long-running
          description: Defaults to one-shot.
        schedule:
          type: string
          description: 5-field cron; required when executionMode is long-running.
        computeRef:
          type: string
        serviceAccountId:
          type: string
    cloud_agents.Event:
      title: Event
      type: object
      description: One entry in a session's ordered log. Seq is monotonic per session so a subscriber can resume from its
        last-seen point.
      properties:
        id:
          type: string
        sessionId:
          type: string
        seq:
          type: integer
          format: int64
        kind:
          type: string
          enum:
          - message
          - tool-call
          - spawn
          - log
          - status
          - control
        actor:
          type: string
        payload:
          type: object
          description: Opaque, well-formed, size-bounded JSON blob.
        createdAt:
          type: string
          format: date-time
    cloud_agents.EventRequest:
      title: EventRequest
      type: object
      required:
      - kind
      properties:
        kind:
          type: string
          enum:
          - message
          - tool-call
          - spawn
          - log
          - status
          - control
        actor:
          type: string
        payload:
          type: object
          description: Opaque JSON blob (validated well-formed, size-bounded).
    cloud_agents.Metrics:
      title: Metrics
      type: object
      description: Invocations-over-time histogram (real counts) plus an all-null Resource Usage rollup (this store meters
        no CPU/memory/storage/cost).
      properties:
        range:
          type: string
          enum:
          - 24H
          - 7D
          - 30D
        series:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: Agent name.
              points:
                type: array
                items:
                  type: object
                  properties:
                    t:
                      type: string
                      format: date-time
                      description: Bucket start (RFC3339 UTC).
                    v:
                      type: integer
                      description: Invocation count in the bucket.
        resource:
          type: object
          properties:
            cpuVcpuHours:
              type: number
              format: double
              nullable: true
            memGbHours:
              type: number
              format: double
              nullable: true
            storageIoBytes:
              type: number
              format: double
              nullable: true
            costCents:
              type: number
              format: double
              nullable: true
