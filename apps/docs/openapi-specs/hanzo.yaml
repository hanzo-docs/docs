                      $ref: '#/components/schemas/zt_Terminator'
                  meta:
                    $ref: '#/components/schemas/zt_Meta'
  /v1/zt/sessions:
    get:
      tags:
      - Sessions
      summary: List sessions
      operationId: zt_listSessions
      parameters:
      - name: filter
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: List of active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/zt_Session'
                  meta:
                    $ref: '#/components/schemas/zt_Meta'
  /v1/zt/sessions/{id}:
    get:
      tags:
      - Sessions
      summary: Get session
      operationId: zt_getSession
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/zt_Session'
        '404':
          $ref: '#/components/responses/zt_NotFound'
    delete:
      tags:
      - Sessions
      summary: Delete session
      operationId: zt_deleteSession
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Session terminated
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/zt_NotFound'
  /v1/zt/terminators:
    get:
      tags:
      - Terminators
      summary: List terminators
      operationId: zt_listTerminators
      parameters:
      - name: filter
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: List of terminators
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/zt_Terminator'
                  meta:
                    $ref: '#/components/schemas/zt_Meta'
    post:
      tags:
      - Terminators
      summary: Create terminator
      operationId: zt_createTerminator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/zt_TerminatorCreate'
      responses:
        '201':
          description: Terminator created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/zt_Terminator'
        '400':
          $ref: '#/components/responses/zt_BadRequest'
  /v1/zt/terminators/{id}:
    get:
      tags:
      - Terminators
      summary: Get terminator
      operationId: zt_getTerminator
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Terminator details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/zt_Terminator'
        '404':
          $ref: '#/components/responses/zt_NotFound'
    put:
      tags:
      - Terminators
      summary: Update terminator
      operationId: zt_updateTerminator
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cost:
                  type: integer
                precedence:
                  type: string
                  enum:
                  - default
                  - required
                  - failed
      responses:
        '200':
          description: Terminator updated
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/zt_NotFound'
    delete:
      tags:
      - Terminators
      summary: Delete terminator
      operationId: zt_deleteTerminator
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Terminator deleted
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/zt_NotFound'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer JWT issued by Hanzo IAM (https://hanzo.id) or an hk- API key. Discovery: https://hanzo.id/.well-known/openid-configuration.'
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth endpoint
    basicAuth:
      type: http
      scheme: basic
      description: 'Basic Auth with Hanzo Public Key as username and Secret Key as password.

        '
    apiKey:
      type: apiKey
      in: header
      name: Authorization
      description: 'Format: Bearer sk-...'
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Deploy worker API key
    s3Auth:
      type: apiKey
      in: header
      name: Authorization
      description: 'AWS Signature Version 4 authentication.

        Use your Hanzo S3 access key and secret key.

        '
  schemas:
    ai_ChatCompletionRequest:
