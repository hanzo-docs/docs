  /v1/o11y/logs:
    get:
      tags:
      - observe_Logs
      summary: Live org-scoped log stream for a product
      description: 'Returns a live, org-scoped log stream for a product. The admin org

        (`IAM_ADMIN_ORG`) receives the product''s raw infra stdout stream

        (`view: infra`); every other org receives its OWN request log stream

        derived from org-tagged spans (`view: request`). Live-tail by polling

        with `sinceNs` set to the prior response''s `nextCursor`; absent a cursor,

        the last `window` seconds are returned. Every query is LIMIT-bounded.

        '
      operationId: observe_getLogs
      parameters:
      - name: product
        in: query
        required: true
        description: Console product slug. Must match `^[a-z0-9][a-z0-9._-]{0,62}$`.
        schema:
          type: string
          pattern: ^[a-z0-9][a-z0-9._-]{0,62}$
      - name: sinceNs
        in: query
        required: false
        description: Nanosecond cursor from the prior response's `nextCursor`; 0/absent starts a fresh window.
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: window
        in: query
        required: false
        description: Initial look-back window in seconds when no cursor is supplied (default 900, max 86400).
        schema:
          type: integer
          default: 900
          minimum: 1
          maximum: 86400
      - name: limit
        in: query
        required: false
        description: Max lines returned (default 200, max 1000).
        schema:
          type: integer
          default: 200
          minimum: 1
          maximum: 1000
      responses:
        '200':
          description: Log stream page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observe_LogsResponse'
        '400':
          $ref: '#/components/responses/observe_BadRequest'
        '401':
          $ref: '#/components/responses/observe_Unauthorized'
        '403':
          $ref: '#/components/responses/observe_Forbidden'
        '502':
          $ref: '#/components/responses/observe_BadGateway'
        '503':
          $ref: '#/components/responses/observe_ServiceUnavailable'
