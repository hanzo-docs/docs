    cloud_agents.Agent:
      title: Agent
      type: object
      description: "A per-org autonomous agent \u2014 a model, a system prompt (instructions), and a set of tool names. Never\
        \ stores a secret; tool credentials live in KMS by reference."
      properties:
        id:
          type: string
          description: Public handle (agent_...).
        name:
          type: string
          description: Org-unique name matching ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$.
        model:
          type: string
        description:
          type: string
        tools:
          type: array
          items:
            type: string
        status:
          type: string
        executionMode:
          type: string
          enum:
          - one-shot
          - long-running
        schedule:
          type: string
          description: 5-field cron; required and evaluated only when long-running.
        computeRef:
          type: string
          description: Optional visor machine id the bot is bound to.
        serviceAccountId:
          type: string
          description: Optional IAM agent service-account (<org>-<agent>) recorded as the actor on scheduled-run billing.
        runs:
          type: integer
          description: Recorded run count.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    cloud_agents.AgentDetail:
      title: AgentDetail
      type: object
      allOf:
      - $ref: '#/components/schemas/cloud_agents.Agent'
      - type: object
        properties:
          instructions:
            type: string
          recentRuns:
            type: array
            items:
              $ref: '#/components/schemas/cloud_agents.Run'
    cloud_agents.ControlRequest:
      title: ControlRequest
      type: object
      description: Optional control body. pause/resume/stop often carry none; message requires a 'message' or 'payload'.
      properties:
        message:
          type: string
        payload:
          type: object
    cloud_agents.ControlResult:
      title: ControlResult
      type: object
      properties:
