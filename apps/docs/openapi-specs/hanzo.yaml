      name: endAt
      in: query
      required: true
      description: End timestamp in milliseconds
      schema:
        type: integer
        format: int64
    analytics_orderBy:
      name: orderBy
      in: query
      schema:
        type: string
    analytics_page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    analytics_pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
    analytics_reportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    analytics_search:
      name: search
      in: query
      schema:
        type: string
    analytics_sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    analytics_shareId:
      name: shareId
      in: path
      required: true
      schema:
        type: string
