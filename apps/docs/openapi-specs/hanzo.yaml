  /v1/projects/{slug}/deploy:
    parameters:
    - $ref: '#/components/parameters/projects_Slug'
    post:
      tags:
      - projects_Deployments
      summary: Deploy a project live
      description: "Two modes on one endpoint, selected by Content-Type:\n\n- Artifact (default): the request body is a tar\
        \ or tar.gz of the BUILT\n  site (must contain `index.html` at the root). The site is unpacked to\n  S3 under `<org>/<slug>/`,\
        \ marked public-read, and a `live` deployment\n  is recorded. Responds `200` with the finalized deployment.\n\n- Git\
        \ (`Content-Type: application/json`, body `{\"source\":\"git\",...}`):\n  records a `queued` deployment and responds\
        \ `202`. CI builds the linked\n  repo and later calls the completion hook to flip it live. Requires the\n  project\
        \ to have a linked repo.\n"
      operationId: projects_deployProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/projects_GitDeployRequest'
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: tar or tar.gz of the built site (must contain index.html at root).
      responses:
        '200':
          description: Artifact deployed live.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects_Deployment'
        '202':
          description: Git deployment queued for CI build.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects_Deployment'
        '400':
          $ref: '#/components/responses/projects_BadRequest'
        '403':
          $ref: '#/components/responses/projects_Forbidden'
        '404':
          $ref: '#/components/responses/projects_NotFound'
        '500':
          $ref: '#/components/responses/projects_InternalServerError'
        '502':
          description: Upload to object storage failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects_Error'
        '503':
          $ref: '#/components/responses/projects_ServiceUnavailable'
  /v1/projects/{slug}/deployments:
    parameters:
    - $ref: '#/components/parameters/projects_Slug'
    get:
      tags:
      - projects_Deployments
      summary: List deployments for a project
      operationId: projects_listDeployments
      responses:
        '200':
          description: Deployment history for the project.
          content:
