      name: timezone
      in: query
      schema:
        type: string
        example: America/Los_Angeles
    analytics_unit:
      name: unit
      in: query
      schema:
        type: string
        enum:
        - minute
        - hour
        - day
        - week
        - month
        - year
    analytics_userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    analytics_websiteId:
      name: websiteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    authors_AuthorId:
      name: id
      in: path
      required: true
      description: Author id (e.g. aut_...).
      schema:
        type: string
    commerce_display:
      name: display
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    commerce_page:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1
    commerce_q:
      name: q
      in: query
      description: Search query
      schema:
        type: string
    commerce_sort:
      name: sort
      in: query
      description: Sort field (prefix with - for descending)
      schema:
        type: string
        default: -UpdatedAt
    eval_LimitParam:
      name: limit
      in: query
      description: Max items to return (default 100, max 500).
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    eval_NamePathParam:
      name: name
      in: path
      required: true
      description: The org-unique dataset name (also a URL path segment).
      schema:
        type: string
        pattern: ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$
    kms_envId:
      name: envId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    kms_projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    mq_AccountId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Account ID (maps to IAM org_id).
    mq_BucketName:
      name: bucket
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: KV bucket name.
    mq_ConsumerName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Consumer name.
    mq_KeyName:
      name: key
      in: path
      required: true
      schema:
        type: string
        maxLength: 1024
      description: Key name (supports dotted hierarchy).
    mq_LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      description: Maximum number of items to return.
    mq_ObjectName:
      name: name
      in: path
      required: true
      schema:
        type: string
        maxLength: 1024
      description: Object name.
    mq_OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of items to skip.
    mq_StoreName:
      name: store
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Object store name.
    mq_StreamName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Stream name.
    mq_StreamNamePath:
      name: stream
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Stream name.
    operative_SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique session identifier
    platform_TRPCInput:
      name: input
      in: query
      description: URL-encoded JSON input for tRPC queries
      schema:
        type: string
    projects_DeploymentId:
      name: id
      in: path
      required: true
      description: Deployment id (e.g. dep_...).
      schema:
        type: string
    projects_Slug:
      name: slug
      in: path
      required: true
      description: Org-unique project handle (lowercased); also the S3 key segment and subdomain label.
      schema:
        type: string
        pattern: ^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$
    provisioning_Name:
      name: name
      in: path
      required: true
      description: 'The user-supplied resource name (slug). Lowercased and trimmed server-side;

        must match `^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$`.

        '
      schema:
        type: string
        pattern: ^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$
    search_IndexUid:
      name: indexUid
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
      description: Unique index identifier
