      responses:
        '201':
          description: Consumer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Consumer'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '409':
          description: Consumer already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/streams/{stream}/consumers/{name}:
    get:
      operationId: mq_getConsumer
      summary: Get consumer info
      description: 'Returns consumer configuration and delivery state including

        pending count, ack floor, and redelivery metrics.

        '
      tags:
      - Consumers
