          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cloud_agents.ControlRequest'
      responses:
        '200':
          description: The recorded control command.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cloud_agents.ControlResult'
        '404':
          description: No such session in this org.
        '409':
          description: The session is finished; a finished session cannot be steered.
        '502':
          description: Control recorded but the tasks-engine cancel failed.
