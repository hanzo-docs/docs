- name: flow
  description: Hanzo Flow API
- name: framework
  description: Hanzo Framework API
- name: functions
  description: Hanzo Functions API
- name: gateway
  description: Hanzo Gateway API
- name: git
  description: Hanzo Git API
- name: graph
  description: Hanzo Graph API
- name: guard
  description: Hanzo Guard API
- name: iam
  description: Hanzo IAM API
- name: integrations
  description: Hanzo Integrations API
- name: kb
  description: Hanzo KB API
- name: kms
  description: Hanzo KMS API
- name: kv
  description: Hanzo KV API
- name: ml
  description: Hanzo ML API
- name: mq
  description: Hanzo MQ API
- name: nexus
  description: Hanzo Nexus API
- name: notify
