  parameters:
    analytics_endAt:
      name: endAt
      in: query
      required: true
      description: End timestamp in milliseconds
      schema:
        type: integer
        format: int64
    analytics_orderBy:
      name: orderBy
      in: query
      schema:
        type: string
    analytics_page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    analytics_pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
    analytics_reportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    analytics_search:
      name: search
      in: query
      schema:
        type: string
    analytics_sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    analytics_shareId:
      name: shareId
      in: path
      required: true
      schema:
        type: string
    analytics_startAt:
      name: startAt
      in: query
      required: true
      description: Start timestamp in milliseconds
      schema:
        type: integer
        format: int64
    analytics_teamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    analytics_timezone:
      name: timezone
      in: query
      schema:
        type: string
        example: America/Los_Angeles
    analytics_unit:
      name: unit
      in: query
      schema:
        type: string
        enum:
        - minute
        - hour
        - day
        - week
        - month
        - year
    analytics_userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    analytics_websiteId:
      name: websiteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    commerce_display:
      name: display
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    commerce_page:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1
    commerce_q:
      name: q
      in: query
      description: Search query
      schema:
        type: string
    commerce_sort:
      name: sort
      in: query
      description: Sort field (prefix with - for descending)
      schema:
        type: string
        default: -UpdatedAt
    kms_envId:
      name: envId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    kms_projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    mq_AccountId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Account ID (maps to IAM org_id).
    mq_BucketName:
      name: bucket
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: KV bucket name.
    mq_ConsumerName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Consumer name.
    mq_KeyName:
      name: key
      in: path
      required: true
      schema:
        type: string
        maxLength: 1024
      description: Key name (supports dotted hierarchy).
    mq_LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      description: Maximum number of items to return.
    mq_ObjectName:
      name: name
      in: path
      required: true
      schema:
        type: string
        maxLength: 1024
      description: Object name.
    mq_OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of items to skip.
    mq_StoreName:
      name: store
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Object store name.
    mq_StreamName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Stream name.
    mq_StreamNamePath:
      name: stream
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
        maxLength: 256
      description: Stream name.
    operative_SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique session identifier
    platform_TRPCInput:
      name: input
      in: query
      description: URL-encoded JSON input for tRPC queries
      schema:
        type: string
    search_IndexUid:
      name: indexUid
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]+$
      description: Unique index identifier
    visor_Field:
      name: field
      in: query
      schema:
        type: string
      description: Field name to filter by
    visor_Owner:
      name: owner
      in: query
      schema:
        type: string
      description: Owner (organization) name
    visor_Page:
      name: p
      in: query
      schema:
        type: string
      description: Page number
    visor_PageSize:
      name: pageSize
      in: query
      schema:
        type: string
      description: Number of items per page
    visor_SortField:
      name: sortField
      in: query
      schema:
        type: string
      description: Field to sort by
    visor_SortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum:
        - ascend
        - descend
      description: Sort direction
    visor_Value:
      name: value
      in: query
      schema:
        type: string
      description: Value to filter for
