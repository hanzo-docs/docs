security:
- bearerAuth: []
paths:
  /.well-known/jwks:
    get:
      tags:
      - iam_Authentication
      operationId: iam_RootController.GetJwks
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_jose.JSONWebKey'
      summary: Root Controller Get Jwks
  /.well-known/openid-configuration:
    get:
      tags:
      - iam_Authentication
      description: Get Oidc Discovery
      operationId: iam_RootController.GetOidcDiscovery
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.OidcDiscovery'
      summary: Root Controller Get Oidc Discovery
  /.well-known/webfinger:
    get:
      tags:
      - iam_Authentication
      operationId: iam_RootController.GetWebFinger
      parameters:
      - in: query
        name: resource
        description: resource
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.WebFinger'
      summary: Root Controller Get Web Finger
  /.well-known/{application}/jwks:
    get:
      tags:
      - iam_Authentication
      operationId: iam_RootController.GetJwksByApplication
      parameters:
      - in: path
        name: application
        description: application name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_jose.JSONWebKey'
      summary: Root Controller Get Jwks By Application
  /.well-known/{application}/openid-configuration:
    get:
      tags:
      - iam_Authentication
      description: Get Oidc Discovery for specific application
      operationId: iam_RootController.GetOidcDiscoveryByApplication
      parameters:
      - in: path
        name: application
        description: application name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.OidcDiscovery'
      summary: Root Controller Get Oidc Discovery By Application
  /.well-known/{application}/webfinger:
    get:
      tags:
      - iam_Authentication
      operationId: iam_RootController.GetWebFingerByApplication
      parameters:
      - in: path
        name: application
        description: application name
        required: true
        schema:
          type: string
      - in: query
        name: resource
        description: resource
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.WebFinger'
      summary: Root Controller Get Web Finger By Application
  /health:
    get:
      operationId: stream_healthCheck
      summary: Health check
      tags:
      - stream_Health
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - ok
                  version:
                    type: string
                  pubsub_connected:
                    type: boolean
                  topics:
                    type: integer
        '503':
          description: Service is unhealthy
  /healthz:
    get:
      tags:
      - vector_Service
      summary: Health check
      operationId: vector_healthCheck
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            text/plain:
              schema:
                type: string
  /metrics:
    get:
      operationId: search_getMetrics
      summary: Get Prometheus metrics
      tags:
      - search_Stats
      responses:
        '200':
          description: Prometheus text metrics
          content:
            text/plain:
              schema:
                type: string
  /oauth/apple:
    get:
      tags:
      - chat_OAuth
      summary: Initiate Apple OAuth
      security: []
      responses:
        '302':
          description: Redirect to Apple
      operationId: chat_getOauthApple
  /oauth/apple/callback:
    post:
      tags:
      - chat_OAuth
      summary: Apple OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_postOauthAppleCallback
  /oauth/callback:
    post:
      tags:
      - iam_Authentication
      description: Get Login Error Counts
      operationId: iam_ApiController.Callback
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.Userinfo'
      summary: Api Controller Callback
  /oauth/discord:
    get:
      tags:
      - chat_OAuth
      summary: Initiate Discord OAuth
      security: []
      responses:
        '302':
          description: Redirect to Discord
      operationId: chat_getOauthDiscord
  /oauth/discord/callback:
    get:
      tags:
      - chat_OAuth
      summary: Discord OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthDiscordCallback
  /oauth/error:
    get:
      tags:
      - chat_OAuth
      summary: OAuth error handler
      security: []
      responses:
        '302':
          description: Redirect to login with error
      operationId: chat_getOauthError
  /oauth/facebook:
    get:
      tags:
      - chat_OAuth
      summary: Initiate Facebook OAuth
      security: []
      responses:
        '302':
          description: Redirect to Facebook
      operationId: chat_getOauthFacebook
  /oauth/facebook/callback:
    get:
      tags:
      - chat_OAuth
      summary: Facebook OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthFacebookCallback
  /oauth/github:
    get:
      tags:
      - chat_OAuth
      summary: Initiate GitHub OAuth
      security: []
      responses:
        '302':
          description: Redirect to GitHub
      operationId: chat_getOauthGithub
  /oauth/github/callback:
    get:
      tags:
      - chat_OAuth
      summary: GitHub OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthGithubCallback
  /oauth/google:
    get:
      tags:
      - chat_OAuth
      summary: Initiate Google OAuth
      security: []
      responses:
        '302':
          description: Redirect to Google
      operationId: chat_getOauthGoogle
  /oauth/google/callback:
    get:
      tags:
      - chat_OAuth
      summary: Google OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthGoogleCallback
  /oauth/introspect:
    post:
      tags:
      - iam_Authentication
      description: The introspection endpoint is an OAuth 2.0 endpoint that takes a
      operationId: iam_ApiController.IntrospectToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: access_token's value or refresh_token's value
                token_type_hint:
                  type: string
                  description: the token type access_token or refresh_token
              required:
              - token
              - token_type_hint
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.IntrospectionResponse'
        '400':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
        '401':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
      summary: Api Controller Introspect Token
  /oauth/openid:
    get:
      tags:
      - chat_OAuth
      summary: Initiate OpenID Connect login
      security: []
      responses:
        '302':
          description: Redirect to OpenID provider
      operationId: chat_getOauthOpenid
  /oauth/openid/callback:
    get:
      tags:
      - chat_OAuth
      summary: OpenID Connect callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthOpenidCallback
  /oauth/saml:
    get:
      tags:
      - chat_OAuth
      summary: Initiate SAML login
      security: []
      responses:
        '302':
          description: Redirect to SAML IdP
      operationId: chat_getOauthSaml
  /oauth/saml/callback:
    post:
      tags:
      - chat_OAuth
      summary: SAML callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_postOauthSamlCallback
  /oauth/token:
    post:
      tags:
      - iam_Tokens
      description: get OAuth access token
      operationId: iam_ApiController.GetOAuthToken
      parameters:
      - in: query
        name: grant_type
        description: OAuth grant type
        required: true
        schema:
          type: string
      - in: query
        name: client_id
        description: OAuth client id
        required: true
        schema:
          type: string
      - in: query
        name: client_secret
        description: OAuth client secret
        required: true
        schema:
          type: string
      - in: query
        name: code
        description: OAuth code
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenWrapper'
        '400':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
        '401':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
      summary: Api Controller Get O Auth Token
  /oauth/token/refresh:
    post:
      tags:
      - iam_Tokens
      description: refresh OAuth access token
      operationId: iam_ApiController.RefreshToken
      parameters:
      - in: query
        name: grant_type
        description: OAuth grant type
        required: true
        schema:
          type: string
      - in: query
        name: refresh_token
        description: OAuth refresh token
        required: true
        schema:
          type: string
      - in: query
        name: scope
        description: OAuth scope
        required: true
        schema:
          type: string
      - in: query
        name: client_id
        description: OAuth client id
        required: true
        schema:
          type: string
      - in: query
        name: client_secret
        description: OAuth client secret
        schema:
          type: string
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenWrapper'
        '400':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
        '401':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
      summary: Api Controller Refresh Token
  /oauth/userinfo:
    get:
      tags:
      - iam_Users
      description: return user information according to OIDC standards
      operationId: iam_ApiController.UserInfo
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.Userinfo'
      summary: Api Controller User Info
  /v1/admin/affiliates:
    get:
      tags:
      - affiliates_Admin
      summary: List all affiliates
      description: 'Returns every affiliate (org exposed) plus a fleet summary. Global-admin

        only. Wrapped in the admin `{ status, msg, data }` envelope.

        '
      operationId: affiliates_adminListAffiliates
      parameters:
      - name: limit
        in: query
        required: false
        description: Max rows to return (default 500, max 1000).
        schema:
          type: integer
          default: 500
          maximum: 1000
      responses:
        '200':
          description: Affiliate directory and summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_AdminListEnvelope'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
  /v1/admin/affiliates/sweep:
    post:
      tags:
      - affiliates_Admin
      summary: Run the accrual sweep
      description: 'The periodic accrual path (cron/o11y hits it, or an operator on demand). It

        folds over every approved affiliate''s referred orgs and accrues this period''s

        commission, at-most-once per period. Global-admin only.

        '
      operationId: affiliates_adminSweepAffiliates
      responses:
        '200':
          description: Sweep result (edges checked and accruals created).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_AdminSweepEnvelope'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
  /v1/admin/affiliates/{id}/approve:
    post:
      tags:
      - affiliates_Admin
      summary: Approve an affiliate and mint its code
      description: 'Approves the affiliate and mints its code. The body may carry an explicit

        `code` override; else the requested vanity code; else a derived slug.

        Global-admin only.

        '
      operationId: affiliates_adminApproveAffiliate
      parameters:
      - $ref: '#/components/parameters/affiliates_AffiliateId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/affiliates_ApproveRequest'
      responses:
        '200':
          description: The approved affiliate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_AdminAffiliateEnvelope'
        '400':
          $ref: '#/components/responses/affiliates_BadRequest'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '404':
          $ref: '#/components/responses/affiliates_NotFound'
        '409':
          $ref: '#/components/responses/affiliates_Conflict'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
  /v1/admin/affiliates/{id}/payout:
    post:
      tags:
      - affiliates_Admin
      summary: Record a payout
      description: "Records a payout of accrued commission. A `credits` method issues a commerce\ngrant into the affiliate's\
        \ wallet; a cash method (wire/paypal/\u2026) is\nrecord-only. The amount can never exceed pending (accrued \u2212\
        \ paid), reserved\natomically before any grant. Global-admin only.\n"
      operationId: affiliates_adminPayoutAffiliate
      parameters:
      - $ref: '#/components/parameters/affiliates_AffiliateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/affiliates_PayoutRequest'
      responses:
        '200':
          description: The recorded payout and the updated affiliate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_AdminPayoutEnvelope'
        '400':
          $ref: '#/components/responses/affiliates_BadRequest'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '404':
          $ref: '#/components/responses/affiliates_NotFound'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
  /v1/admin/affiliates/{id}/suspend:
    post:
      tags:
      - affiliates_Admin
      summary: Suspend an affiliate
      description: Suspends the affiliate. Global-admin only.
      operationId: affiliates_adminSuspendAffiliate
      parameters:
      - $ref: '#/components/parameters/affiliates_AffiliateId'
      responses:
        '200':
          description: The suspended affiliate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/affiliates_AdminAffiliateEnvelope'
        '403':
          $ref: '#/components/responses/affiliates_Forbidden'
        '404':
          $ref: '#/components/responses/affiliates_NotFound'
        '500':
          $ref: '#/components/responses/affiliates_InternalError'
  /v1/admin/analytics:
    get:
      tags:
      - admin_Money
      summary: Native SaaS analytics (retention/growth/churn)
      operationId: admin_adminAnalytics
      parameters:
      - name: range
        in: query
        schema:
          type: string
          enum:
          - 7d
          - 30d
          - 90d
          - all
          default: 30d
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  msg:
                    type: string
                  data:
                    $ref: '#/components/schemas/admin_AnalyticsData'
        '401':
          $ref: '#/components/responses/admin_Unauthorized'
  /v1/admin/applications:
    get:
      tags:
      - admin_Identity
      summary: IAM applications (verbatim passthrough)
      operationId: admin_adminListApplications
      parameters:
      - name: owner
        in: query
        schema:
          type: string
      - name: p
        in: query
        schema:
          type: integer
      - name: pageSize
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: Application rows (raw IAM shape)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin_RawList'
        '401':
          $ref: '#/components/responses/admin_Unauthorized'
  /v1/admin/audit:
    get:
      tags:
      - admin_Audit
      summary: Query the tamper-evident audit trail
      operationId: admin_adminListAudit
      parameters:
      - name: org
        in: query
        schema:
          type: string
      - name: sub
        in: query
        schema:
          type: string
      - name: action
        in: query
        schema:
          type: string
      - name: resource
        in: query
        schema:
          type: string
      - name: result
        in: query
        schema:
          type: string
      - name: since
        in: query
        schema:
          type: string
          format: date-time
      - name: until
        in: query
        schema:
          type: string
          format: date-time
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 100
      - name: p
        in: query
        schema:
          type: integer
          default: 1
      responses:
        '200':
          description: Audit rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  msg:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/admin_AuditRow'
                  data2:
                    type: integer
                  integrity:
                    $ref: '#/components/schemas/admin_AuditIntegrity'
        '401':
          $ref: '#/components/responses/admin_Unauthorized'
  /v1/admin/audit/verify:
    get:
      tags:
      - admin_Audit
      summary: Verify audit-chain integrity
      operationId: admin_adminVerifyAudit
      responses:
        '200':
          description: Integrity result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  msg:
                    type: string
                  data:
                    $ref: '#/components/schemas/admin_AuditIntegrity'
        '401':
          $ref: '#/components/responses/admin_Unauthorized'
  /v1/admin/authors:
    get:
      tags:
      - authors_Admin
      summary: List all authors
      description: Every author (org exposed) plus a fleet summary. Global-admin only.
      operationId: authors_adminListAuthors
      parameters:
      - name: limit
        in: query
        description: Max rows (default 500, capped at 1000).
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 500
      responses:
        '200':
          description: Author directory and summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_AdminListEnvelope'
        '403':
          $ref: '#/components/responses/authors_Forbidden'
        '500':
          $ref: '#/components/responses/authors_InternalServerError'
  /v1/admin/authors/sweep:
    post:
      tags:
      - authors_Admin
      summary: Run accrual sweep
      description: 'The periodic accrual path. Folds over every approved author''s distinct

        deploying orgs and accrues this period''s royalty, at-most-once per period.

