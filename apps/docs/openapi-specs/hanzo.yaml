  /v1/authors:
    get:
      tags:
      - authors_Authors
      summary: Get my author program
      description: 'Returns the caller org''s author dashboard. If the org has not connected, a

        "not enrolled" shape is returned (`isAuthor: false`) so the console shows the

        connect form. For an APPROVED author, an opportunistic accrual sweep runs

        first so the dashboard is self-updating.

        '
      operationId: authors_getMyAuthors
      responses:
        '200':
          description: Author dashboard, or the not-enrolled shape.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/authors_NotEnrolled'
                - $ref: '#/components/schemas/authors_AuthorDashboard'
        '403':
          $ref: '#/components/responses/authors_Forbidden'
        '500':
          $ref: '#/components/responses/authors_InternalServerError'
  /v1/authors/connect:
    post:
      tags:
      - authors_Authors
      summary: Connect GitHub
      description: "Enrolls the caller's org as an author at status `connected`, idempotently.\nLinks a GitHub login \u2014\
        \ from IAM's linked account (identity verified) when\npresent, else the supplied `githubLogin` \u2014 and mints a\
        \ stable verify code.\nReturns 201 when newly created, 200 when already connected.\n"
      operationId: authors_connectAuthor
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authors_ConnectRequest'
      responses:
        '200':
          description: Already connected (idempotent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_ConnectResponse'
        '201':
          description: Newly enrolled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_ConnectResponse'
        '400':
          $ref: '#/components/responses/authors_BadRequest'
        '403':
          $ref: '#/components/responses/authors_Forbidden'
        '500':
          $ref: '#/components/responses/authors_InternalServerError'
  /v1/authors/deploys/record:
    post:
      tags:
      - authors_Deploys
      summary: Record a deploy
      description: "Records a deploy-attribution edge for the caller (the DEPLOYING org). When\n`repoUrl` matches a verified\
        \ author repo, the edge is recorded (idempotent\nper repo+project+org) and becomes eligible for royalty. A deploy\
        \ of a repo\nthat is not a verified author repo is NOT an error \u2014 it returns\n`recorded: false` so the deploy\
        \ path can fire this unconditionally. A\nself-deploy is recorded (provenance) but excluded from accrual.\n"
      operationId: authors_recordDeploy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authors_RecordDeployRequest'
      responses:
        '200':
          description: Not recorded (no source repo, or repo is not a verified author repo), or already-recorded edge.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/authors_DeployNotRecorded'
                - $ref: '#/components/schemas/authors_DeployRecorded'
        '201':
          description: New deploy edge recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_DeployRecorded'
        '400':
          $ref: '#/components/responses/authors_BadRequest'
        '403':
          $ref: '#/components/responses/authors_Forbidden'
        '500':
          $ref: '#/components/responses/authors_InternalServerError'
  /v1/authors/repos/verify:
    post:
      tags:
      - authors_Authors
      summary: Verify a repo
      description: 'Verifies the caller owns a repo and records it as a verified author repo.

        Ownership is proven by an IAM-linked GitHub token (admin/push) OR a

        `hanzo.json` on the default branch carrying the author''s verify code. The

        author must have connected first. Returns 201 when newly verified, 200 when

        already recorded.

        '
      operationId: authors_verifyRepo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authors_VerifyRepoRequest'
      responses:
        '200':
          description: Repo already verified (idempotent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_VerifyRepoResponse'
        '201':
          description: Repo newly verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_VerifyRepoResponse'
        '400':
          $ref: '#/components/responses/authors_BadRequest'
        '403':
          $ref: '#/components/responses/authors_Forbidden'
        '409':
          description: That repo is already verified by another author.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_Error'
        '422':
          description: Ownership could not be verified (grant the GitHub app or add the verify file).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authors_Error'
        '500':
          $ref: '#/components/responses/authors_InternalServerError'
  /v1/authz/check:
    post:
      tags:
      - authz_Enforcement
      summary: Check a permission
      description: 'Evaluates whether subject `sub` may perform action `act` on object `obj`

        under the calling org''s policy set. The org is selected by the

        gateway-minted `X-Org-Id` header; an unauthenticated request (no org) is

        rejected. All three fields are required.

        '
      operationId: authz_authzCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authz_EnforceRequest'
      responses:
        '200':
          description: Enforcement decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authz_CheckResponse'
        '400':
          $ref: '#/components/responses/authz_BadRequest'
        '401':
          $ref: '#/components/responses/authz_Unauthorized'
        '500':
          $ref: '#/components/responses/authz_InternalServerError'
  /v1/authz/health:
    get:
      tags:
