  /v1/stream/topics:
    get:
      operationId: stream_listTopics
      summary: List topics
      description: List all Kafka topics managed by Hanzo Stream.
      tags:
      - stream_Topics
      responses:
        '200':
          description: Topic list
          content:
            application/json:
              schema:
                type: object
                properties:
                  topics:
                    type: array
                    items:
                      $ref: '#/components/schemas/stream_Topic'
                  total:
                    type: integer
    post:
      operationId: stream_createTopic
      summary: Create a topic
      description: 'Create a new Kafka topic. Under the hood, this creates one PubSub

        JetStream stream per partition.

        '
      tags:
      - stream_Topics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: Topic name
                  example: events
                partitions:
                  type: integer
                  default: 1
                  description: Number of partitions
                replication_factor:
                  type: integer
                  default: 1
                  description: Replication factor for underlying PubSub streams
                config:
                  type: object
                  properties:
                    retention_ms:
                      type: integer
                    cleanup_policy:
                      type: string
                      enum:
                      - delete
                      - compact
                    compression_type:
                      type: string
                      enum:
                      - none
                      - gzip
                      - snappy
                      - lz4
                      - zstd
            examples:
              basic:
                summary: Basic topic
                value:
                  name: events
                  partitions: 3
                  replication_factor: 1
      responses:
        '201':
          description: Topic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stream_Topic'
        '409':
          description: Topic already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stream_Error'
  /v1/stream/topics/{topic}:
    get:
      operationId: stream_getTopicMetadata
      summary: Get topic metadata
      description: Returns topic configuration and partition details.
      tags:
