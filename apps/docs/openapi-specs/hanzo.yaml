              schema:
                $ref: '#/components/schemas/authz_PolicyListResponse'
        '401':
          $ref: '#/components/responses/authz_Unauthorized'
        '500':
          $ref: '#/components/responses/authz_InternalServerError'
    post:
      tags:
      - authz_Policies
      summary: Add a policy
      description: 'Adds a `[sub, obj, act]` rule to the calling org''s policy set. Requires

        an admin role on the request JWT. Returns `201` when the rule was newly

        added and `200` when it already existed.

        '
      operationId: authz_authzAddPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authz_EnforceRequest'
      responses:
        '201':
          description: Policy added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authz_AddPolicyResponse'
        '200':
          description: Policy already present (no change).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authz_AddPolicyResponse'
        '400':
          $ref: '#/components/responses/authz_BadRequest'
        '401':
          $ref: '#/components/responses/authz_Unauthorized'
        '403':
          $ref: '#/components/responses/authz_Forbidden'
        '500':
          $ref: '#/components/responses/authz_InternalServerError'
    delete:
      tags:
      - authz_Policies
      summary: Remove a policy
      description: 'Removes a `[sub, obj, act]` rule from the calling org''s policy set.

        Requires an admin role on the request JWT.

        '
      operationId: authz_authzRemovePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authz_EnforceRequest'
      responses:
        '200':
          description: Removal result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authz_RemovePolicyResponse'
        '400':
          $ref: '#/components/responses/authz_BadRequest'
        '401':
          $ref: '#/components/responses/authz_Unauthorized'
        '403':
          $ref: '#/components/responses/authz_Forbidden'
        '500':
          $ref: '#/components/responses/authz_InternalServerError'
