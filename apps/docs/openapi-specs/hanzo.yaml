        '404':
          $ref: '#/components/responses/mq_NotFound'
    post:
      operationId: mq_createConsumer
      summary: Create consumer
      description: 'Creates a new consumer on the specified stream. Consumers track

        delivery state and support at-least-once or exactly-once semantics

        depending on the ack policy.

        '
      tags:
      - mq_Consumers
      parameters:
      - $ref: '#/components/parameters/mq_StreamNamePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mq_ConsumerConfig'
      responses:
        '201':
          description: Consumer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Consumer'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '401':
          $ref: '#/components/responses/mq_Unauthorized'
        '404':
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
        '409':
          description: Consumer already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mq_Error'
  /v1/mq/streams/{stream}/consumers/{name}:
    get:
      operationId: mq_getConsumer
      summary: Get consumer info
      description: 'Returns consumer configuration and delivery state including

        pending count, ack floor, and redelivery metrics.

        '
      tags:
      - mq_Consumers
      parameters:
      - $ref: '#/components/parameters/mq_StreamNamePath'
      - $ref: '#/components/parameters/mq_ConsumerName'
      responses:
        '200':
