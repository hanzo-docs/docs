          $ref: '#/components/responses/websearch_Unauthorized'
        '503':
          $ref: '#/components/responses/websearch_NotConfigured'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: IAM-issued JWT or `hk-` Cloud API key.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer JWT issued by Hanzo IAM (https://hanzo.id). The same token authenticates every Hanzo service.
    oauth2:
      type: oauth2
      description: OAuth2 authentication via Hanzo IAM
      flows:
        authorizationCode:
          authorizationUrl: https://iam.hanzo.ai/oauth/authorize
          tokenUrl: https://iam.hanzo.ai/oauth/token
          refreshUrl: https://iam.hanzo.ai/oauth/token
          scopes:
            openid: OpenID Connect identity
            profile: User profile information
            email: Email address
            read: Read access to resources
            write: Write access to resources
            admin: Administrative access
        clientCredentials:
          tokenUrl: https://iam.hanzo.ai/oauth/token
          scopes:
            read: Read access to resources
            write: Write access to resources
            admin: Administrative access
        password:
          tokenUrl: https://iam.hanzo.ai/oauth/token
          scopes:
            openid: OpenID Connect identity
            profile: User profile information
            email: Email address
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: 'API key for service-to-service authentication.


        Generate keys via the Hanzo Gateway /key/generate endpoint.

        '
    basicAuth:
      type: http
      scheme: basic
      description: 'Basic Auth with Hanzo Public Key as username and Secret Key as password.

        '
    serviceKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Shared service key (KMS-sourced) presented server-side by the chat node process. Not a user JWT.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Deploy worker API key
    s3Auth:
      type: apiKey
      in: header
      name: Authorization
      description: 'AWS Signature Version 4 authentication.

        Use your Hanzo S3 access key and secret key.

        '
  schemas:
    admin_AccessResult:
      type: object
      properties:
        org:
          type: string
        suspended:
          type: boolean
        affected:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            type: string
    admin_AdminMe:
      type: object
      properties:
        owner:
          type: string
        name:
          type: string
        email:
          type: string
        displayName:
          type: string
        isGlobalAdmin:
          type: boolean
    admin_AnalyticsData:
      type: object
      properties:
        range:
          type: string
        interval:
          type: string
        generatedAt:
          type: string
        signups:
          type: array
          items:
            $ref: '#/components/schemas/admin_SeriesPoint'
        cumulativeCustomers:
          type: array
          items:
            $ref: '#/components/schemas/admin_SeriesPoint'
        totalCustomers:
          type: integer
        newCustomers:
          type: integer
        growthRatePct:
          type: number
          format: double
        activeCustomers:
          type: array
          items:
            $ref: '#/components/schemas/admin_SeriesPoint'
        dau:
          type: integer
        wau:
          type: integer
        mau:
          type: integer
        retention:
          $ref: '#/components/schemas/admin_RetentionGrid'
        churn:
          type: array
          items:
            $ref: '#/components/schemas/admin_SeriesPoint'
        churnRatePct:
          type: number
          format: double
        mrrCents:
          type: integer
          format: int64
        revenue:
          type: array
          items:
            $ref: '#/components/schemas/admin_SeriesPoint'
        arpuCents:
          type: integer
          format: int64
        ltvCents:
          type: integer
          format: int64
          nullable: true
        nrrPct:
