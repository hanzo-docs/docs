          type: string
          enum:
          - pause
          - resume
          - stop
          - message
        event:
          $ref: '#/components/schemas/cloud_agents.Event'
        forwarded:
          type: boolean
          description: True when the command was forwarded to the hanzoai/tasks engine.
    cloud_agents.CreateAgentRequest:
      title: CreateAgentRequest
