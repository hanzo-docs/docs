        name:
          type: string
          description: Stream name (alphanumeric, hyphens, underscores).
          pattern: ^[a-zA-Z0-9_-]+$
          maxLength: 256
        subjects:
          type: array
          items:
            type: string
          description: 'Subjects bound to this stream. Supports wildcards.

            '
        retention:
          type: string
          enum:
          - limits
          - interest
          - workqueue
          default: limits
          description: 'Message retention policy. `limits` keeps messages until

            limits are hit. `interest` keeps messages while consumers

            exist. `workqueue` deletes messages after acknowledgment.

            '
        max_msgs:
          type: integer
          format: int64
          default: -1
          description: Maximum number of messages (-1 for unlimited).
        max_bytes:
          type: integer
          format: int64
          default: -1
          description: Maximum total bytes (-1 for unlimited).
        max_age:
          type: string
          description: 'Maximum message age (e.g., "24h", "7d", "0" for unlimited).

            '
          default: '0'
        max_msg_size:
          type: integer
          format: int32
          default: -1
          description: Maximum single message size in bytes (-1 for default).
        storage:
          type: string
          enum:
          - file
          - memory
          default: file
          description: Storage backend for stream data.
        num_replicas:
          type: integer
          minimum: 1
          maximum: 5
          default: 1
          description: Number of replicas in the cluster.
        discard:
          type: string
          enum:
          - old
          - new
          default: old
          description: 'Discard policy when limits are reached. `old` discards the

            oldest messages. `new` rejects new messages.

            '
        duplicate_window:
          type: string
          description: 'Window for message deduplication based on Nats-Msg-Id header

            (e.g., "2m"). Defaults to "2m".

            '
          default: 2m
        description:
          type: string
          description: Optional human-readable description.
      required:
      - name
      - subjects
    mq_StreamMessage:
      type: object
      description: A message stored in a JetStream stream.
      properties:
        subject:
          type: string
        data:
          type: string
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        sequence:
          type: integer
          format: uint64
          description: Stream sequence number.
        timestamp:
          type: string
          format: date-time
        num_delivered:
          type: integer
          description: Number of times this message has been delivered.
        num_pending:
          type: integer
          description: Messages remaining after this one (consumer context).
    mq_StreamState:
      type: object
      description: Current state of a JetStream stream.
      properties:
        messages:
          type: integer
          format: uint64
          description: Total number of messages in the stream.
        bytes:
          type: integer
          format: uint64
          description: Total bytes used by the stream.
        first_seq:
          type: integer
          format: uint64
          description: Sequence number of the first message.
        first_ts:
          type: string
          format: date-time
          description: Timestamp of the first message.
        last_seq:
          type: integer
          format: uint64
          description: Sequence number of the last message.
        last_ts:
          type: string
          format: date-time
          description: Timestamp of the last message.
        consumer_count:
          type: integer
          description: Number of consumers attached to this stream.
        num_subjects:
          type: integer
          description: Number of unique subjects in the stream.
        num_deleted:
          type: integer
          description: Number of deleted messages (gaps in sequence).
