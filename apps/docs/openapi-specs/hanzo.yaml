openapi: 3.1.0
info:
  title: "Hanzo Cloud \u2014 Unified API"
  description: "The single unified OpenAPI surface for ALL Hanzo services, aggregated from the per-service specs. Every route\
    \ is https://api.hanzo.ai/v1/<service>/*. Regenerated by merge.py \u2014 edit the per-service <svc>/openapi.yaml, not\
    \ this file."
  version: 1.0.0
  contact:
    name: Hanzo AI
    url: https://hanzo.ai
    email: support@hanzo.ai
  license:
    name: Proprietary
servers:
- url: https://api.hanzo.ai
  description: Hanzo Gateway
tags:
- name: ai
  description: "Hanzo AI \u2014 Inference API"
- name: analytics
  description: Hanzo Analytics API
- name: app
  description: "Hanzo App \u2014 Projects & Deployments"
- name: auto
  description: Hanzo Auto API
- name: base
  description: "Hanzo Base \u2014 Collections"
- name: bot
  description: Hanzo Bot API
- name: chat
  description: Hanzo Chat API
- name: cloud
  description: Hanzo Cloud API
- name: commerce
  description: Hanzo Commerce API
- name: console
  description: Hanzo Console API
- name: db
  description: Hanzo DB API
- name: did
  description: Hanzo DID API
- name: dns
  description: Hanzo DNS API
- name: edge
  description: Hanzo Edge API
- name: engine
  description: Hanzo Engine API
- name: evals
  description: Hanzo Evals API
- name: flow
  description: Hanzo Flow API
- name: gateway
  description: Hanzo Gateway API
- name: guard
  description: Hanzo Guard API
- name: iam
  description: Hanzo IAM API
- name: kms
  description: Hanzo KMS API
- name: kv
  description: Hanzo KV API
- name: ml
  description: Hanzo ML API
- name: mq
  description: Hanzo MQ API
- name: nexus
  description: Hanzo Nexus API
- name: o11y
  description: Hanzo O11y API
- name: operative
  description: Hanzo Operative API
- name: paas
  description: Hanzo PaaS API
- name: platform
  description: Hanzo Platform API
- name: pricing
  description: Hanzo Pricing API
- name: pubsub
  description: Hanzo PubSub API
- name: registry
  description: Hanzo Registry API
- name: s3
  description: Hanzo S3 API
- name: search
  description: Hanzo Search API
- name: stream
  description: Hanzo Stream API
- name: vector
  description: Hanzo Vector API
- name: visor
  description: Hanzo Visor API
- name: zt
  description: Hanzo ZT API
security:
- bearerAuth: []
paths:
  /.well-known/jwks:
    get:
      tags:
      - Authentication
      operationId: iam_RootController.GetJwks
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_jose.JSONWebKey'
      summary: Root Controller Get Jwks
  /.well-known/openid-configuration:
    get:
      tags:
      - Authentication
      description: Get Oidc Discovery
      operationId: iam_RootController.GetOidcDiscovery
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.OidcDiscovery'
      summary: Root Controller Get Oidc Discovery
  /.well-known/webfinger:
    get:
      tags:
      - Authentication
      operationId: iam_RootController.GetWebFinger
      parameters:
      - in: query
        name: resource
        description: resource
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.WebFinger'
      summary: Root Controller Get Web Finger
  /.well-known/{application}/jwks:
    get:
      tags:
      - Authentication
      operationId: iam_RootController.GetJwksByApplication
      parameters:
      - in: path
        name: application
        description: application name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_jose.JSONWebKey'
      summary: Root Controller Get Jwks By Application
  /.well-known/{application}/openid-configuration:
    get:
      tags:
      - Authentication
      description: Get Oidc Discovery for specific application
      operationId: iam_RootController.GetOidcDiscoveryByApplication
      parameters:
      - in: path
        name: application
        description: application name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.OidcDiscovery'
      summary: Root Controller Get Oidc Discovery By Application
  /.well-known/{application}/webfinger:
    get:
      tags:
      - Authentication
      operationId: iam_RootController.GetWebFingerByApplication
      parameters:
      - in: path
        name: application
        description: application name
        required: true
        schema:
          type: string
      - in: query
        name: resource
        description: resource
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.WebFinger'
      summary: Root Controller Get Web Finger By Application
  /health:
    get:
      tags:
      - Health
      summary: Health check
      operationId: zt_healthCheck
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthy:
                    type: boolean
  /healthz:
    get:
      tags:
      - Service
      summary: Health check
      operationId: vector_healthCheck
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            text/plain:
              schema:
                type: string
  /metrics:
    get:
      operationId: search_getMetrics
      summary: Get Prometheus metrics
      tags:
      - Stats
      responses:
        '200':
          description: Prometheus text metrics
          content:
            text/plain:
              schema:
                type: string
  /oauth/apple:
    get:
      tags:
      - OAuth
      summary: Initiate Apple OAuth
      security: []
      responses:
        '302':
          description: Redirect to Apple
      operationId: chat_getOauthApple
  /oauth/apple/callback:
    post:
      tags:
      - OAuth
      summary: Apple OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_postOauthAppleCallback
  /oauth/callback:
    post:
      tags:
      - Authentication
      description: Get Login Error Counts
      operationId: iam_ApiController.Callback
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.Userinfo'
      summary: Api Controller Callback
  /oauth/discord:
    get:
      tags:
      - OAuth
      summary: Initiate Discord OAuth
      security: []
      responses:
        '302':
          description: Redirect to Discord
      operationId: chat_getOauthDiscord
  /oauth/discord/callback:
    get:
      tags:
      - OAuth
      summary: Discord OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthDiscordCallback
  /oauth/error:
    get:
      tags:
      - OAuth
      summary: OAuth error handler
      security: []
      responses:
        '302':
          description: Redirect to login with error
      operationId: chat_getOauthError
  /oauth/facebook:
    get:
      tags:
      - OAuth
      summary: Initiate Facebook OAuth
      security: []
      responses:
        '302':
          description: Redirect to Facebook
      operationId: chat_getOauthFacebook
  /oauth/facebook/callback:
    get:
      tags:
      - OAuth
      summary: Facebook OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthFacebookCallback
  /oauth/github:
    get:
      tags:
      - OAuth
      summary: Initiate GitHub OAuth
      security: []
      responses:
        '302':
          description: Redirect to GitHub
      operationId: chat_getOauthGithub
  /oauth/github/callback:
    get:
      tags:
      - OAuth
      summary: GitHub OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthGithubCallback
  /oauth/google:
    get:
      tags:
      - OAuth
      summary: Initiate Google OAuth
      security: []
      responses:
        '302':
          description: Redirect to Google
      operationId: chat_getOauthGoogle
  /oauth/google/callback:
    get:
      tags:
      - OAuth
      summary: Google OAuth callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthGoogleCallback
  /oauth/introspect:
    post:
      tags:
      - Authentication
      description: The introspection endpoint is an OAuth 2.0 endpoint that takes a
      operationId: iam_ApiController.IntrospectToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: access_token's value or refresh_token's value
                token_type_hint:
                  type: string
                  description: the token type access_token or refresh_token
              required:
              - token
              - token_type_hint
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.IntrospectionResponse'
        '400':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
        '401':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
      summary: Api Controller Introspect Token
  /oauth/openid:
    get:
      tags:
      - OAuth
      summary: Initiate OpenID Connect login
      security: []
      responses:
        '302':
          description: Redirect to OpenID provider
      operationId: chat_getOauthOpenid
  /oauth/openid/callback:
    get:
      tags:
      - OAuth
      summary: OpenID Connect callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_getOauthOpenidCallback
  /oauth/saml:
    get:
      tags:
      - OAuth
      summary: Initiate SAML login
      security: []
      responses:
        '302':
          description: Redirect to SAML IdP
      operationId: chat_getOauthSaml
  /oauth/saml/callback:
    post:
      tags:
      - OAuth
      summary: SAML callback
      security: []
      responses:
        '302':
          description: Redirect with auth tokens
      operationId: chat_postOauthSamlCallback
  /oauth/token:
    post:
      tags:
      - Tokens
      description: get OAuth access token
      operationId: iam_ApiController.GetOAuthToken
      parameters:
      - in: query
        name: grant_type
        description: OAuth grant type
        required: true
        schema:
          type: string
      - in: query
        name: client_id
        description: OAuth client id
        required: true
        schema:
          type: string
      - in: query
        name: client_secret
        description: OAuth client secret
        required: true
        schema:
          type: string
      - in: query
        name: code
        description: OAuth code
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenWrapper'
        '400':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
        '401':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
      summary: Api Controller Get O Auth Token
  /oauth/token/refresh:
    post:
      tags:
      - Tokens
      description: refresh OAuth access token
      operationId: iam_ApiController.RefreshToken
      parameters:
      - in: query
        name: grant_type
        description: OAuth grant type
        required: true
        schema:
          type: string
      - in: query
        name: refresh_token
        description: OAuth refresh token
        required: true
        schema:
          type: string
      - in: query
        name: scope
        description: OAuth scope
        required: true
        schema:
          type: string
      - in: query
        name: client_id
        description: OAuth client id
        required: true
        schema:
          type: string
      - in: query
        name: client_secret
        description: OAuth client secret
        schema:
          type: string
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenWrapper'
        '400':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
        '401':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.TokenError'
      summary: Api Controller Refresh Token
  /oauth/userinfo:
    get:
      tags:
      - Users
      description: return user information according to OIDC standards
      operationId: iam_ApiController.UserInfo
      responses:
        '200':
          description: The Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iam_object.Userinfo'
      summary: Api Controller User Info
  /v1/analytics/admin/users:
    get:
      operationId: analytics_adminListUsers
      tags:
      - Admin
      summary: List all users (admin only)
      parameters:
      - $ref: '#/components/parameters/analytics_page'
      - $ref: '#/components/parameters/analytics_pageSize'
      - $ref: '#/components/parameters/analytics_orderBy'
      - $ref: '#/components/parameters/analytics_search'
      responses:
        '200':
          description: Paginated user list with website counts
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                  - $ref: '#/components/schemas/analytics_User'
                  - type: object
                    properties:
                      _count:
                        type: object
                        properties:
                          websiteUser:
                            type: integer
  /v1/analytics/admin/websites:
    get:
      operationId: analytics_adminListWebsites
      tags:
      - Admin
      summary: List all websites for a user (admin only)
      parameters:
      - name: userId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      - name: includeOwnedTeams
        in: query
        schema:
          type: string
      - name: includeAllTeams
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/analytics_page'
      - $ref: '#/components/parameters/analytics_pageSize'
      - $ref: '#/components/parameters/analytics_orderBy'
      - $ref: '#/components/parameters/analytics_search'
      responses:
        '200':
          description: Paginated website list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/analytics_Website'
  /v1/analytics/auth/login:
    post:
      operationId: analytics_login
      tags:
      - Auth
      summary: Log in with username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      username:
                        type: string
                      role:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      isAdmin:
                        type: boolean
        '401':
          description: Incorrect username or password
  /v1/analytics/auth/logout:
    post:
      operationId: analytics_logout
      tags:
      - Auth
      summary: Log out and invalidate token
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
  /v1/analytics/auth/sso:
    post:
      operationId: analytics_ssoAuth
      tags:
      - Auth
      summary: Exchange SSO credentials for a session token
      responses:
        '200':
          description: SSO token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/analytics_User'
                  token:
                    type: string
  /v1/analytics/auth/verify:
    post:
      operationId: analytics_verifyAuth
      tags:
      - Auth
      summary: Verify current auth token
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analytics_User'
        '401':
          description: Invalid token
  /v1/analytics/batch:
    post:
      operationId: analytics_batch
      tags:
      - Collect
      summary: Send a batch of events
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/analytics_SendPayload'
      responses:
        '200':
          description: Batch processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  size:
                    type: integer
                  processed:
                    type: integer
                  errors:
                    type: integer
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        response:
                          type: object
  /v1/analytics/heartbeat:
    get:
      operationId: analytics_heartbeat
      tags:
      - Auth
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /v1/analytics/me:
    get:
      operationId: analytics_getMe
      tags:
      - Me
      summary: Get current authenticated user info
      responses:
        '200':
          description: Current user auth context
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/analytics_User'
  /v1/analytics/me/password:
    post:
      operationId: analytics_changeMyPassword
      tags:
      - Me
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - currentPassword
              - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analytics_User'
        '400':
          description: Current password is incorrect
  /v1/analytics/me/teams:
    get:
      operationId: analytics_getMyTeams
      tags:
      - Me
      summary: List teams for the current user
      parameters:
      - $ref: '#/components/parameters/analytics_page'
      - $ref: '#/components/parameters/analytics_pageSize'
      - $ref: '#/components/parameters/analytics_orderBy'
      - $ref: '#/components/parameters/analytics_search'
      responses:
        '200':
          description: Paginated list of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/analytics_Team'
  /v1/analytics/me/websites:
    get:
      operationId: analytics_getMyWebsites
      tags:
      - Me
      summary: List websites for the current user
      parameters:
      - $ref: '#/components/parameters/analytics_page'
      - $ref: '#/components/parameters/analytics_pageSize'
      - $ref: '#/components/parameters/analytics_orderBy'
      - $ref: '#/components/parameters/analytics_search'
      responses:
        '200':
          description: Paginated list of websites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/analytics_Website'
  /v1/analytics/realtime/{websiteId}:
    get:
      operationId: analytics_getRealtimeData
      tags:
      - Realtime
      summary: Get realtime visitor data for the last 30 minutes
      parameters:
      - $ref: '#/components/parameters/analytics_websiteId'
      - $ref: '#/components/parameters/analytics_timezone'
      responses:
        '200':
          description: Realtime data
          content:
            application/json:
              schema:
                type: object
  /v1/analytics/reports:
    get:
      operationId: analytics_listReports
      tags:
      - Reports
      summary: List reports, optionally filtered by website or team
      parameters:
      - name: websiteId
        in: query
        schema:
          type: string
          format: uuid
      - name: teamId
        in: query
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/analytics_page'
      - $ref: '#/components/parameters/analytics_pageSize'
      - $ref: '#/components/parameters/analytics_orderBy'
      - $ref: '#/components/parameters/analytics_search'
      responses:
        '200':
          description: Paginated list of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/analytics_Report'
    post:
      operationId: analytics_createReport
      tags:
      - Reports
      summary: Create a new report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - websiteId
              - name
              - type
              - description
              - parameters
              properties:
                websiteId:
                  type: string
                  format: uuid
                name:
                  type: string
                  maxLength: 200
                type:
                  type: string
                  enum:
                  - funnel
                  - insights
                  - retention
                  - utm
                  - goals
                  - journey
                  - revenue
                  - attribution
                description:
                  type: string
                  maxLength: 500
                parameters:
                  type: object
      responses:
        '200':
          description: Report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analytics_Report'
  /v1/analytics/reports/attribution:
    post:
      operationId: analytics_runAttributionReport
      tags:
      - Reports
      summary: Run an attribution report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - websiteId
              - dateRange
              - model
              - steps
              properties:
                websiteId:
                  type: string
                  format: uuid
                dateRange:
                  $ref: '#/components/schemas/analytics_DateRange'
                model:
                  type: string
                  enum:
                  - firstClick
                  - lastClick
                steps:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - type
                    - value
                    properties:
                      type:
                        type: string
                      value:
                        type: string
                currency:
                  type: string
      responses:
        '200':
          description: Attribution data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/analytics/reports/funnel:
    post:
      operationId: analytics_runFunnelReport
      tags:
      - Reports
      summary: Run a funnel report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - websiteId
              - dateRange
              - window
              - steps
              properties:
                websiteId:
                  type: string
                  format: uuid
                dateRange:
                  $ref: '#/components/schemas/analytics_DateRange'
                window:
                  type: number
                  description: Funnel window in minutes
                  minimum: 1
                steps:
                  type: array
                  minItems: 2
                  items:
                    type: object
                    required:
                    - type
                    - value
                    properties:
                      type:
                        type: string
                      value:
                        type: string
      responses:
        '200':
          description: Funnel results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
