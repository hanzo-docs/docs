      type: object
      properties:
        error:
          type: string
        code:
          type: integer
    guard_RateLimitStatus:
      type: object
      properties:
        user_id:
          type: string
        requests_remaining:
          type: integer
        tokens_remaining:
          type: integer
        reset_at:
          type: string
          format: date-time
        limited:
          type: boolean
    guard_SanitizeConfig:
      type: object
      properties:
        pii:
          type: object
          properties:
            enabled:
              type: boolean
              default: true
            detect_ssn:
              type: boolean
              default: true
            detect_credit_card:
              type: boolean
              default: true
            detect_email:
              type: boolean
              default: true
            detect_phone:
              type: boolean
              default: true
            detect_ip:
              type: boolean
              default: true
            detect_api_keys:
              type: boolean
              default: true
            redaction_format:
              type: string
              default: '[REDACTED:{TYPE}]'
        injection:
          type: object
          properties:
            enabled:
              type: boolean
              default: true
            block_on_detection:
              type: boolean
              default: true
            sensitivity:
              type: number
              format: float
              minimum: 0
              maximum: 1
              default: 0.7
              description: Detection threshold (0.0-1.0)
            custom_patterns:
              type: array
              items:
                type: string
        content_filter:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            block_controversial:
              type: boolean
              default: false
            blocked_categories:
              type: array
              items:
                type: string
                enum:
                - violent
                - illegal_acts
                - sexual_content
                - self_harm
                - jailbreak
                - unethical_acts
                - politically_sensitive
                - copyright_violation
                - pii
        rate_limit:
          type: object
          properties:
            enabled:
              type: boolean
              default: true
            requests_per_minute:
              type: integer
              default: 60
            tokens_per_minute:
              type: integer
              default: 100000
            burst_size:
              type: integer
              default: 10
    guard_SanitizeRequest:
      type: object
      required:
      - text
      properties:
        text:
          type: string
          description: Text to sanitize
          example: My SSN is 123-45-6789 and email is ceo@company.com
        direction:
          type: string
          enum:
          - input
          - output
          default: input
          description: Sanitization direction (input runs all 5 stages, output runs PII + content filter)
        user_id:
          type: string
          description: User ID for rate limiting and audit
        session_id:
          type: string
          description: Session ID for audit correlation
        config:
          $ref: '#/components/schemas/guard_SanitizeConfig'
    guard_SanitizeResult:
      type: object
      properties:
        status:
          type: string
          enum:
          - clean
          - redacted
          - blocked
          description: Sanitization result status
        text:
          type: string
          description: Sanitized text (present for clean and redacted)
        reason:
          type: string
          description: Block reason (present only for blocked)
        redactions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                - ssn
                - credit_card
                - email
                - phone
                - ip
                - api_key
              start:
                type: integer
              end:
                type: integer
              hash:
                type: string
                description: SHA-256 hash of the original value for audit correlation
          description: PII redactions applied
        injection:
          type: object
          properties:
            detected:
              type: boolean
            confidence:
              type: number
              format: float
            patterns:
              type: array
              items:
                type: string
          description: Injection detection results
        content_filter:
          type: object
          properties:
            category:
              type: string
              enum:
              - safe
              - controversial
              - unsafe
            threats:
              type: array
              items:
                type: string
          description: Content classification results
        processing_time_us:
          type: integer
          description: Processing time in microseconds
