  /v1/integrations/slack/commands:
    post:
      tags:
      - integrations_Slack
      summary: Slack slash command webhook
      operationId: integrations_slackCommands
      description: Public at the JWT layer; HMAC-verified inside the handler. Accepts the Slack `application/x-www-form-urlencoded`
        slash-command payload.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                command:
                  type: string
                text:
                  type: string
                team_id:
                  type: string
                user_id:
                  type: string
                channel_id:
                  type: string
                response_url:
                  type: string
      responses:
        '200':
          description: Slash command acknowledged
  /v1/integrations/slack/events:
    post:
      tags:
      - integrations_Slack
      summary: Slack Events API webhook
      operationId: integrations_slackEvents
      description: Public at the JWT layer; authenticated inside the handler by HMAC-SHA256 over the raw body with the Slack
        signing secret. Handles the `url_verification` challenge and routes `app_mention`/`message` events to an on-behalf-of
        agent run.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/integrations_SlackEventEnvelope'
      responses:
        '200':
          description: Acknowledged (challenge echo, or empty ack)
  /v1/integrations/slack/link:
    get:
      tags:
      - integrations_Slack
      summary: "Begin the per-user account link (leg 1 \u2014 Slack sign-in)"
      operationId: integrations_slackLinkStart
      description: Sets a `__Host-` init cookie and redirects to Slack sign-in. State-authed (no bearer).
      security: []
      parameters:
      - name: state
        in: query
        required: true
        schema:
          type: string
        description: Signed, single-use link state
      responses:
        '302':
          description: Redirect to Slack sign-in
        '400':
          description: Invalid or expired link
        '503':
          description: Account linking not configured
  /v1/integrations/slack/link/callback:
    get:
      tags:
      - integrations_Slack
      summary: "hanzo.id OIDC callback \u2014 bind Slack\u2194Hanzo (leg 3)"
      operationId: integrations_slackLinkCallback
      description: Reads the Slack-verified (team,user) from the `__Host-` link cookie, exchanges the OIDC code, and seals
        the refresh token into the workspace org's KMS namespace. Returns an HTML confirmation page.
      security: []
      parameters:
      - name: code
        in: query
        schema:
          type: string
      - name: state
        in: query
        schema:
          type: string
      - name: error
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Account linked
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing/mismatched state or workspace not connected
        '503':
          description: Secret store unavailable or linking not configured
  /v1/integrations/slack/link/slack:
    get:
      tags:
      - integrations_Slack
      summary: Slack sign-in callback (leg 2)
      operationId: integrations_slackLinkSlack
      description: Requires the leg-1 init cookie to match the sign-in state before exchanging the code; sets the `__Host-`
        link cookie and redirects to hanzo.id OIDC.
      security: []
      parameters:
      - name: code
        in: query
        schema:
          type: string
      - name: state
        in: query
        schema:
          type: string
      - name: error
        in: query
        schema:
          type: string
      responses:
        '302':
          description: Redirect to hanzo.id OIDC authorize
        '400':
          description: Invalid state, session mismatch, or sign-in failed
        '503':
          description: Account linking not configured
  /v1/integrations/{provider}:
