openapi: 3.1.0
info:
  title: Hanzo Authz API
  summary: Multi-tenant policy engine (Casbin fork) served at /v1/authz/* (hanzoai/authz).
  description: 'The Hanzo authorization API served by the `hanzoai/authz` subsystem of the

    unified cloud binary (HIP-0106), reached through the gateway at

    `api.hanzo.ai`.


    `authz` is the in-house policy engine (a Casbin fork) wrapped in a thin HTTP

    surface: permission checks and policy CRUD over a canonical RBAC model

    (`sub, obj, act -> allow`, with role inheritance via `g(sub, role)`). The full

    enforcement library remains importable directly (package `authz`) for

    in-process consumers that need richer semantics than this HTTP surface

    exposes.


    Multi-tenancy: every handler is scoped by the gateway-minted `X-Org-Id`

    header that Hanzo IAM''s JWT validation produces. Policies are held in a

    per-org enforcer keyed by org; a request without an org is rejected so

    policies never collapse across tenants. Policy-mutating routes additionally

    require an admin role (the gateway emits `X-User-IsAdmin=true` for

    superadmins).


    Authentication: Bearer JWT issued by Hanzo IAM (`https://hanzo.id`). The same

    token authenticates every Hanzo service. `authz` mounts after `iam`

    (HIP-0106 order 70 vs 50) because its handlers trust the org identity that

    iam derives from the JWT.

    '
  version: 1.0.0
  contact:
    name: Hanzo AI
    url: https://hanzo.ai
    email: support@hanzo.ai
  license:
    name: Proprietary
    url: https://hanzo.ai/terms
servers:
- url: https://api.hanzo.ai
  description: Hanzo Gateway Production
security:
- bearerAuth: []
tags:
- name: Health
  description: Liveness and readiness probes (no auth required).
- name: Enforcement
  description: Permission checks against the per-org policy set.
- name: Policies
  description: Policy CRUD (admin-scoped for mutations).
paths:
  /v1/authz/health:
    get:
      tags:
      - Health
      summary: Liveness probe
      description: Always served, no auth required. Returns a static status object.
      operationId: authzHealth
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: authz
  /v1/authz/readyz:
    get:
      tags:
      - Health
      summary: Readiness probe
      description: Always served, no auth required. Returns a static readiness object.
      operationId: authzReadyz
      security: []
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  service:
                    type: string
                    example: authz
  /v1/authz/check:
    post:
      tags:
      - Enforcement
      summary: Check a permission
      description: 'Evaluates whether subject `sub` may perform action `act` on object `obj`

        under the calling org''s policy set. The org is selected by the

        gateway-minted `X-Org-Id` header; an unauthenticated request (no org) is

        rejected. All three fields are required.

        '
      operationId: authzCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnforceRequest'
      responses:
        '200':
          description: Enforcement decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/authz/policies:
    get:
      tags:
      - Policies
      summary: List policies
      description: 'Returns every policy rule for the calling org as an array of

        `[sub, obj, act]` tuples. Scoped by the gateway-minted `X-Org-Id`

        header.

        '
      operationId: authzListPolicies
      responses:
        '200':
          description: The org's policy set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
      - Policies
      summary: Add a policy
      description: 'Adds a `[sub, obj, act]` rule to the calling org''s policy set. Requires

        an admin role on the request JWT. Returns `201` when the rule was newly

        added and `200` when it already existed.

        '
      operationId: authzAddPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnforceRequest'
      responses:
        '201':
          description: Policy added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddPolicyResponse'
        '200':
          description: Policy already present (no change).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
      - Policies
      summary: Remove a policy
      description: 'Removes a `[sub, obj, act]` rule from the calling org''s policy set.

        Requires an admin role on the request JWT.

        '
      operationId: authzRemovePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnforceRequest'
      responses:
        '200':
          description: Removal result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemovePolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      $ref: '#/components/securitySchemes/bearerAuth'
    oauth2:
      type: oauth2
      description: OAuth2 authentication via Hanzo IAM
      flows:
        authorizationCode:
          authorizationUrl: https://iam.hanzo.ai/oauth/authorize
          tokenUrl: https://iam.hanzo.ai/oauth/token
          refreshUrl: https://iam.hanzo.ai/oauth/token
          scopes:
            openid: OpenID Connect identity
            profile: User profile information
            email: Email address
            read: Read access to resources
            write: Write access to resources
            admin: Administrative access
        clientCredentials:
          tokenUrl: https://iam.hanzo.ai/oauth/token
          scopes:
            read: Read access to resources
            write: Write access to resources
            admin: Administrative access
        password:
          tokenUrl: https://iam.hanzo.ai/oauth/token
          scopes:
            openid: OpenID Connect identity
            profile: User profile information
            email: Email address
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: 'API key for service-to-service authentication.


        Generate keys via the Hanzo Gateway /key/generate endpoint.

        '
  schemas:
    EnforceRequest:
      type: object
      description: An RBAC access tuple.
      required:
      - sub
      - obj
      - act
      properties:
        sub:
          type: string
          description: Subject — the user or role requesting access.
        obj:
          type: string
          description: Object — the resource being accessed.
        act:
          type: string
          description: Action — the operation on the object.
    CheckResponse:
      type: object
      description: Enforcement decision, echoing the evaluated tuple.
      properties:
        allow:
          type: boolean
          description: Whether the tuple is permitted by the org's policy set.
        sub:
          type: string
        obj:
          type: string
        act:
          type: string
    PolicyListResponse:
      type: object
      properties:
        policies:
          type: array
          description: Each entry is a [sub, obj, act] policy rule.
          items:
            type: array
            items:
              type: string
    AddPolicyResponse:
      type: object
      properties:
        added:
          type: boolean
          description: True if the rule was newly added; false if it already existed.
    RemovePolicyResponse:
      type: object
      properties:
        removed:
          type: boolean
          description: True if a matching rule was removed.
    Error:
      type: object
      required:
      - status
      - msg
      properties:
        status:
          type: string
          enum:
          - error
          description: Always "error" for error responses
        msg:
          type: string
          description: Human-readable error message
        code:
          type: integer
          description: Application-specific error code
        data:
          type: object
          description: Additional error context
        data2:
          type: object
          description: Additional error details
        requestId:
          type: string
          description: Request ID for debugging
    ValidationError:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        msg:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
              code:
                type: string
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          enum:
          - Bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds
        refresh_token:
          type: string
          description: Refresh token for obtaining new access tokens
        scope:
          type: string
          description: Space-separated list of granted scopes
        id_token:
          type: string
          description: OpenID Connect ID token (JWT)
    UserInfo:
      type: object
      description: OIDC UserInfo response
      properties:
        sub:
          type: string
          description: Subject identifier (user ID)
        name:
          type: string
        given_name:
          type: string
        family_name:
          type: string
        preferred_username:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        phone_number:
          type: string
        phone_number_verified:
          type: boolean
        picture:
          type: string
          format: uri
        updated_at:
          type: integer
          description: Unix timestamp
    Web3AuthRequest:
      type: object
      description: Web3 wallet authentication request
      required:
      - address
      - nonce
      - signature
      properties:
        address:
          type: string
          description: Ethereum wallet address
          pattern: ^0x[a-fA-F0-9]{40}$
        nonce:
          type: string
          description: Nonce obtained from /v1/iam/auth/web3-nonce
        createAt:
          type: integer
          description: Timestamp when signature was created
        typedData:
          type: string
          description: The message that was signed
        signature:
          type: string
          description: Wallet signature
        walletType:
          type: string
          description: Type of wallet used
          enum:
          - MetaMask
          - WalletConnect
          - Coinbase
          - Rainbow
  responses:
    BadRequest:
      description: Bad Request - Invalid input parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalidParameter:
              value:
                status: error
                msg: 'Invalid parameter: email format is incorrect'
                code: 400
    Unauthorized:
      description: Unauthorized - Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            missingToken:
              value:
                status: error
                msg: Authentication required
                code: 401
            invalidToken:
              value:
                status: error
                msg: Invalid or expired token
                code: 401
    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            insufficientPermissions:
              value:
                status: error
                msg: You don't have permission to access this resource
                code: 403
    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            resourceNotFound:
              value:
                status: error
                msg: Resource not found
                code: 404
    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            alreadyExists:
              value:
                status: error
                msg: Resource with this ID already exists
                code: 409
    UnprocessableEntity:
      description: Unprocessable Entity - Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
          examples:
            validationFailed:
              value:
                status: error
                msg: Validation failed
                errors:
                - field: email
                  message: Invalid email format
                  code: invalid_format
    TooManyRequests:
      description: Too Many Requests - Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Request limit per window
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests in window
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp when window resets
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retry
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            rateLimited:
              value:
                status: error
                msg: Rate limit exceeded. Please retry after 60 seconds
                code: 429
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            serverError:
              value:
                status: error
                msg: An internal error occurred
                code: 500
                requestId: req_abc123
    ServiceUnavailable:
      description: Service Unavailable - Temporary outage
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retry
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            maintenance:
              value:
                status: error
                msg: Service temporarily unavailable
                code: 503
