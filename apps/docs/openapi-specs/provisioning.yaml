components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token issued by Hanzo IAM (https://hanzo.id). The same token
        authenticates every Hanzo service. The org is resolved from the validated
        principal (X-Org-Id); a request without a validated principal is refused.

  parameters:
    Name:
      name: name
      in: path
      required: true
      description: |
        The user-supplied resource name (slug). Lowercased and trimmed server-side;
        must match `^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$`.
      schema:
        type: string
        pattern: '^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$'

  requestBodies:
    CreateResource:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateRequest'

  responses:
    Created:
      description: Resource provisioned. Password (if any) is returned ONCE here.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateResponse'
    Resource:
      description: Resource metadata (never a password).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GetResponse'
    ResourceList:
      description: The caller's org resources of this kind (never a password).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ListItem'
    Deleted:
      description: Resource deprovisioned. No content.
    BadRequest:
      description: Invalid name or malformed request body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PaymentRequired:
      description: Org balance gate failed (unfunded org).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: No validated principal, or empty org without admin claim.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: A resource with this name (or physical name) already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: The backend provisioner or dedicated-instance operation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: |
        Kind is honestly gated (cannot grant a per-tenant-safe credential), or the
        cluster orchestrator is unavailable for a dedicated kind, or commerce is
        unreachable in the fail-closed posture.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    CreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$'
          description: Resource name (lowercased/trimmed server-side).
          example: analytics

    CreateResponse:
      type: object
      description: |
        Returned on 201. `password` and `username` are present only for secretful
        kinds (sql, kv, and the dedicated datastore/docdb admin credential). The
        password is returned ONCE and is never retrievable again.
      required: [id, kind, name, status, host, port, database, connectionString]
      properties:
        id:
          type: string
          description: Server-generated resource id.
        kind:
          type: string
          enum: [sql, vector, datastore, kv, search, s3, docdb]
        name:
          type: string
        status:
          type: string
          description: Resource status (e.g. "ready", or "provisioning" for a dedicated instance still coming up).
          example: ready
        host:
          type: string
          description: Customer-facing host (public gateway host, or dedicated instance service).
        port:
          type: integer
        username:
          type: string
          description: Present only for secretful kinds.
        database:
          type: string
        connectionString:
          type: string
          description: Public, routable DSN (internal admin host is remapped out).
        password:
          type: string
          description: Present only for secretful kinds; returned ONCE.

    GetResponse:
      type: object
      required: [id, name, kind, status, host, port, database]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [sql, vector, datastore, kv, search, s3, docdb]
        status:
          type: string
          example: ready
        host:
          type: string
        port:
          type: integer
        username:
          type: string
          description: Present only for secretful kinds.
        database:
          type: string

    ListItem:
      type: object
      required: [id, name, kind, status, host, port, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [sql, vector, datastore, kv, search, s3, docdb]
        status:
          type: string
          example: ready
        host:
          type: string
        port:
          type: integer
        createdAt:
          type: integer
          format: int64
          description: Unix seconds.

    Error:
      type: object
      required: [status, msg]
      properties:
        status:
          type: string
          enum: [error]
        msg:
          type: string
          description: Human-readable error message.
        code:
          type: integer
        requestId:
          type: string
