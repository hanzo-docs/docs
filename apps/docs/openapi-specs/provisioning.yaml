openapi: 3.1.0
info:
  title: Hanzo Provisioning API
  summary: Managed-resource control plane (hanzoai/cloud clients/provisioning, HIP-0106).
  description: |
    The Hanzo Cloud provisioning control plane. It turns "create a database" into
    a real logical resource inside an already-live, shared product backend — or,
    for the dedicated kinds, launches the org's OWN isolated instance via the
    cluster operator (HIP-0106). Served by the `clients/provisioning` subsystem of
    the unified cloud binary, reached through the gateway at `api.hanzo.ai`.

    NAMESPACE NOTE — these routes are keyed by RESOURCE KIND at top-level `/v1/`,
    NOT under `/v1/provisioning/`. `Mount` registers one CRUD quartet per kind:
    `/v1/sql`, `/v1/vector`, `/v1/datastore`, `/v1/kv`, `/v1/search`, `/v1/s3`,
    `/v1/docdb`. The kind string is the Hanzo product name, never the upstream OSS
    backend name (so `sql`/`s3`, not `postgres`/`minio`). This spec documents the
    surface exactly as the Go code registers it.

    Seven kinds, one Provisioner each:
      - sql       -> Postgres    CREATE DATABASE + ROLE
      - vector    -> Qdrant      collection
      - datastore -> ClickHouse  dedicated per-org instance
      - kv        -> Redis       ACL SETUSER (keyspace scope)
      - search    -> Meilisearch index
      - s3        -> S3/MinIO     bucket
      - docdb     -> FerretDB    dedicated per-org instance (MongoDB wire)

    Tenancy: every request is scoped to the gateway-minted org (`X-Org-Id` /
    validated principal). A request without a validated principal, or with an
    empty org and no admin claim, is refused 403. The physical backend resource is
    namespaced by a fixed-width org hash so two tenants can never fold onto one
    resource.

    Secrets: generated per-resource passwords are sealed in Hanzo KMS and only a
    `secret_ref` is persisted. When KMS is not configured the service degrades
    safely — it returns the password ONCE in the create response and stores
    nothing in plaintext.

    Authentication: Bearer JWT issued by Hanzo IAM (`https://hanzo.id`). The same
    token authenticates every Hanzo service.
  version: 1.0.0
  contact:
    name: Hanzo AI
    url: https://hanzo.ai
    email: support@hanzo.ai
  license:
    name: Proprietary
    url: https://hanzo.ai/terms
servers:
- url: https://api.hanzo.ai
  description: Hanzo Gateway Production
security:
- BearerAuth: []
tags:
- name: sql
  description: Managed SQL (Postgres) database resources.
- name: vector
  description: Managed vector (Qdrant) collection resources.
- name: datastore
  description: Managed analytics datastore (ClickHouse) — dedicated per-org instance.
- name: kv
  description: Managed key-value (Redis) resources.
- name: search
  description: Managed search (Meilisearch) index resources.
- name: s3
  description: Managed object storage (S3/MinIO) bucket resources.
- name: docdb
  description: Managed document database (FerretDB / MongoDB wire) — dedicated per-org instance.

paths:
  /v1/sql:
    post:
      tags: [sql]
      operationId: createSql
      summary: Provision a SQL resource
      requestBody:
        $ref: '#/components/requestBodies/CreateResource'
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '402': { $ref: '#/components/responses/PaymentRequired' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    get:
      tags: [sql]
      operationId: listSql
      summary: List SQL resources for the caller's org
      responses:
        '200': { $ref: '#/components/responses/ResourceList' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /v1/sql/{name}:
    parameters:
    - $ref: '#/components/parameters/Name'
    get:
      tags: [sql]
      operationId: getSql
      summary: Get one SQL resource
      responses:
        '200': { $ref: '#/components/responses/Resource' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [sql]
      operationId: deleteSql
      summary: Deprovision a SQL resource
      responses:
        '204': { $ref: '#/components/responses/Deleted' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502': { $ref: '#/components/responses/BadGateway' }

