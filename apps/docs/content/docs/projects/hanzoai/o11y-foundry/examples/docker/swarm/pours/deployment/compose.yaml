configs:
  ingester-config:
    file: ingester/ingester.yaml
  manager-config:
    file: ingester/opamp.yaml
  telemetrykeeper-0:
    file: telemetrykeeper/clickhousekeeper/keeper-0.yaml
  telemetrystore-config-0-0:
    file: telemetrystore/clickhouse/config-0-0.yaml
  telemetrystore-functions:
    file: telemetrystore/clickhouse/functions.yaml
networks:
  o11y-network:
    attachable: true
    driver: overlay
    name: o11y-network
services:
  ingester:
    command:
    - -c
    - |
      /otel-collector migrate sync check &&
      /otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/opamp-config.yaml --copy-path=/var/tmp/collector-config.yaml
    configs:
    - source: ingester-config
      target: /etc/otel-collector-config.yaml
    - source: manager-config
      target: /etc/opamp-config.yaml
    deploy:
      replicas: 1
    entrypoint:
    - /bin/sh
    environment:
    - O11Y_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://o11y-telemetrystore-clickhouse-0-0:9000
    - O11Y_OTEL_COLLECTOR_TIMEOUT=10m
    image: signoz/signoz-otel-collector:latest
    networks:
      o11y-network:
        aliases:
        - o11y-ingester
    ports:
    - 4317:4317
    - 4318:4318
  o11y-metastore-postgres-0:
    deploy:
      restart_policy:
        condition: on-failure
    environment:
    - POSTGRES_DB=o11y
    - POSTGRES_PASSWORD=o11y
    - POSTGRES_USER=o11y
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -U o11y -d o11y
      timeout: 10s
    image: postgres:16
    networks:
    - o11y-network
    volumes:
    - o11y-metastore-postgres-0-data:/var/lib/postgresql/data
  o11y-o11y-0:
    deploy:
      restart_policy:
        condition: on-failure
    environment:
    - O11Y_SQLSTORE_POSTGRES_DSN=postgres://o11y:o11y@o11y-metastore-postgres-0:5432/o11y?sslmode=disable
    - O11Y_SQLSTORE_PROVIDER=postgres
    - O11Y_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://o11y-telemetrystore-clickhouse-0-0:9000
    - O11Y_TELEMETRYSTORE_PROVIDER=clickhouse
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8080/api/v1/health
      timeout: 10s
    image: signoz/signoz:latest
    networks:
    - o11y-network
    ports:
    - 8080:8080
  o11y-telemetrykeeper-clickhousekeeper-0:
    configs:
    - source: telemetrykeeper-0
      target: /etc/clickhouse-keeper/keeper.yaml
    deploy:
      restart_policy:
        condition: on-failure
    entrypoint:
    - /usr/bin/clickhouse-keeper
    - --config-file=/etc/clickhouse-keeper/keeper.yaml
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD
      - clickhouse-keeper-client
      - -h
      - localhost
      - -p
      - "9181"
      - -q
      - ls
      timeout: 10s
    image: clickhouse/clickhouse-keeper:25.5.6
    networks:
    - o11y-network
    volumes:
    - o11y-telemetrykeeper-0-data:/var/lib/clickhouse-keeper
  o11y-telemetrystore-clickhouse-0-0:
    configs:
    - source: telemetrystore-config-0-0
      target: /etc/clickhouse-server/config.yaml
    - source: telemetrystore-functions
      target: /etc/clickhouse-server/functions.yaml
    deploy:
      restart_policy:
        condition: on-failure
    environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1
    - CLICKHOUSE_CONFIG=/etc/clickhouse-server/config.yaml
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8123/ping
      timeout: 10s
    hostname: o11y-telemetrystore-clickhouse-0-0
    image: clickhouse/clickhouse-server:25.5.6
    networks:
    - o11y-network
    volumes:
    - o11y-telemetrystore-0-0-data:/var/lib/clickhouse
    - o11y-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts:ro
  o11y-telemetrystore-clickhouse-user-scripts:
    command:
    - bash
    - -c
    - |-
      version="v0.0.1"
      node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
      node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
      echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
      cd /tmp
      wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
      tar -xvzf histogram-quantile.tar.gz
      mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    deploy:
      mode: global
      restart_policy:
        condition: none
    image: clickhouse/clickhouse-server:25.5.6
    networks:
    - o11y-network
    volumes:
    - o11y-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts
  o11y-telemetrystore-migrator:
    command:
    - -c
    - |
      /otel-collector migrate ready &&
      /otel-collector migrate bootstrap &&
      /otel-collector migrate sync up &&
      /otel-collector migrate async up
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
    entrypoint:
    - /bin/sh
    environment:
    - O11Y_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://o11y-telemetrystore-clickhouse-0-0:9000
    - O11Y_OTEL_COLLECTOR_TIMEOUT=10m
    image: signoz/signoz-otel-collector:latest
    networks:
    - o11y-network
version: "3"
volumes:
  o11y-metastore-postgres-0-data: null
  o11y-telemetrykeeper-0-data: null
  o11y-telemetrystore-0-0-data: null
  o11y-telemetrystore-user-scripts: null
