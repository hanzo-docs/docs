apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/component: schema-migrator
    app.kubernetes.io/instance: o11y
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: o11y-telemetrystore-migrator
  name: o11y-telemetrystore-migrator
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/component: schema-migrator
        app.kubernetes.io/instance: o11y
        app.kubernetes.io/name: o11y-telemetrystore-migrator
    spec:
      containers:
      - args:
        - migrate
        - async
        - up
        env:
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER
          value: cluster
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION
          value: "true"
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_DSN
          value: tcp://o11y-clickhouse:9000
        - name: O11Y_OTEL_COLLECTOR_TIMEOUT
          value: 10m
        image: signoz/signoz-otel-collector:latest
        imagePullPolicy: IfNotPresent
        name: async
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
      initContainers:
      - args:
        - migrate
        - ready
        env:
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER
          value: cluster
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION
          value: "true"
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_DSN
          value: tcp://o11y-clickhouse:9000
        - name: O11Y_OTEL_COLLECTOR_TIMEOUT
          value: 10m
        image: signoz/signoz-otel-collector:latest
        imagePullPolicy: IfNotPresent
        name: ready
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
      - args:
        - migrate
        - bootstrap
        env:
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER
          value: cluster
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION
          value: "true"
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_DSN
          value: tcp://o11y-clickhouse:9000
        - name: O11Y_OTEL_COLLECTOR_TIMEOUT
          value: 10m
        image: signoz/signoz-otel-collector:latest
        imagePullPolicy: IfNotPresent
        name: bootstrap
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
      - args:
        - migrate
        - sync
        - up
        env:
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER
          value: cluster
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION
          value: "true"
        - name: O11Y_OTEL_COLLECTOR_CLICKHOUSE_DSN
          value: tcp://o11y-clickhouse:9000
        - name: O11Y_OTEL_COLLECTOR_TIMEOUT
          value: 10m
        image: signoz/signoz-otel-collector:latest
        imagePullPolicy: IfNotPresent
        name: sync
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
      restartPolicy: OnFailure
