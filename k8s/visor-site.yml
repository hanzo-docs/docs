# Hanzo Visor Landing + Docs (static Next.js export via nginx)
# Served at visor.hanzo.ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visor-site
  namespace: hanzo
  labels:
    app: visor-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visor-site
  template:
    metadata:
      labels:
        app: visor-site
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: visor
          image: ghcr.io/hanzoai/visor-docs:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: visor-site
  namespace: hanzo
  labels:
    app: visor-site
spec:
  selector:
    app: visor-site
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: visor-site-ingress
  namespace: hanzo
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - visor.hanzo.ai
      secretName: visor-hanzo-ai-tls
  rules:
    - host: visor.hanzo.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: visor-site
                port:
                  number: 80
