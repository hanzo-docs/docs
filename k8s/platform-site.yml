# Hanzo Platform Landing + Docs (static Next.js export via hanzoai/static)
# Served at platform.hanzo.ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-site
  namespace: hanzo
  labels:
    app: platform-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-site
  template:
    metadata:
      labels:
        app: platform-site
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: platform
          image: ghcr.io/hanzoai/platform-site:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: platform-site
  namespace: hanzo
  labels:
    app: platform-site
spec:
  selector:
    app: platform-site
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-site-ingress
  namespace: hanzo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: hanzo
  tls:
    - hosts:
        - platform.hanzo.ai
      secretName: platform-hanzo-ai-tls
  rules:
    - host: platform.hanzo.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-site
                port:
                  number: 80
