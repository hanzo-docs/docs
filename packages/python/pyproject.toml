[project]
name = "hanzodocs_py"
version = "0.1.0"
description = "Extract API documentation from source code and docstrings. For the python API extension for Hanzo Docs."

authors = [{ name = "florez", email = "florez@ethz.ch" }, { name = 'fuma-nama' }]
requires-python = ">=3.10"
dependencies = ["griffe (>=1.13.0, <2.0.0)", "griffe_typingdoc (>=0.2.8, <1.0.0)"]

[project.scripts]
hanzodocs-py-generate = "hanzodocs_py:generate"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
