name: Deploy Cloud Landing Page

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/cloud/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-cloud.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @hanzo/cloud build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Create Cloudflare Pages project (if needed)
        continue-on-error: true
        run: npx wrangler pages project create cloud-site --production-branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}

      - name: Fetch CF credentials from KMS
        id: kms
        env:
          HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
          KMS_ENDPOINT: ${{ vars.KMS_ENDPOINT || 'https://kms.hanzo.ai' }}
        run: |
          response=$(curl -sf "${KMS_ENDPOINT}/api/v1/secrets/raw?secretPath=/deploy&environment=production" \
            -H "Authorization: Bearer ${HANZO_API_KEY}" 2>/dev/null || echo "")
          if [ -n "$response" ]; then
            cf_token=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="CLOUDFLARE_API_TOKEN") | .secretValue // empty')
            cf_account=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="CLOUDFLARE_ACCOUNT_ID") | .secretValue // empty')
          fi
          if [ -z "${cf_token:-}" ]; then
            echo "::error::CF credentials not found in KMS."
            exit 1
          fi
          echo "::add-mask::${cf_token}"
          echo "::add-mask::${cf_account}"
          echo "cf_token=${cf_token}" >> "$GITHUB_OUTPUT"
          echo "cf_account=${cf_account}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/cloud/out --project-name=cloud-site --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}
