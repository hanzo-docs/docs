name: Deploy Base Docs

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/base-docs/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-base-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=base-docs
      - name: Create Cloudflare Pages project (if needed)
        continue-on-error: true
        run: npx wrangler pages project create base-docs --production-branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}
      - run: npx wrangler pages deploy apps/base-docs/out --project-name=base-docs --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}
