name: Fix Cloudflare Domain Mapping

on:
  workflow_dispatch:

jobs:
  fix-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch CF credentials from KMS
        id: kms
        env:
          HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
          KMS_ENDPOINT: ${{ vars.KMS_ENDPOINT || 'https://kms.hanzo.ai' }}
        run: |
          response=$(curl -sf "${KMS_ENDPOINT}/api/v1/secrets/raw?secretPath=/deploy&environment=production" \
            -H "Authorization: Bearer ${HANZO_API_KEY}" 2>/dev/null || echo "")
          if [ -n "$response" ]; then
            cf_token=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="CLOUDFLARE_API_TOKEN") | .secretValue // empty')
            cf_account=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="CLOUDFLARE_ACCOUNT_ID") | .secretValue // empty')
          fi
          if [ -z "${cf_token:-}" ]; then
            echo "::error::CF credentials not found in KMS."
            exit 1
          fi
          echo "::add-mask::${cf_token}"
          echo "::add-mask::${cf_account}"
          echo "cf_token=${cf_token}" >> "$GITHUB_OUTPUT"
          echo "cf_account=${cf_account}" >> "$GITHUB_OUTPUT"

      - name: Fix docs.hanzo.ai Pages domain
        run: |
          set +e

          echo "=== Current hanzo-docs domains ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '.result[]'

          echo ""
          echo "=== Delete deactivated domain ==="
          curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains/docs.hanzo.ai" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '{success: .success, errors: .errors}'

          echo ""
          echo "=== Re-add docs.hanzo.ai ==="
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name": "docs.hanzo.ai"}' | jq '.'

          echo ""
          echo "=== Check DNS zone and try to update CNAME ==="
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=hanzo.ai" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq -r '.result[0].id // empty')

          if [ -z "$ZONE_ID" ]; then
            echo "No DNS zone access. To activate, set DNS CNAME: docs -> hanzo-docs.pages.dev"
            exit 0
          fi

          echo "Zone ID: $ZONE_ID"
          echo ""
          echo "=== Current DNS for docs.hanzo.ai ==="
          DNS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=docs.hanzo.ai" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "$DNS" | jq '.result[]'

          RECORD_ID=$(echo "$DNS" | jq -r '.result[0].id // empty')
          if [ -n "$RECORD_ID" ]; then
            echo ""
            echo "=== Updating record $RECORD_ID to CNAME hanzo-docs.pages.dev ==="
            curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"type":"CNAME","name":"docs","content":"hanzo-docs.pages.dev","proxied":true}' | jq '{success: .success, result: {type: .result.type, content: .result.content}}'
          else
            echo ""
            echo "=== Creating CNAME record ==="
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"type":"CNAME","name":"docs","content":"hanzo-docs.pages.dev","proxied":true}' | jq '{success: .success, result: {type: .result.type, content: .result.content}}'
          fi

          echo ""
          echo "=== Final domain state ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '.result[]'
        env:
          CF_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CF_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}
