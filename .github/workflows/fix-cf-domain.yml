name: Fix Cloudflare Domain Mapping

on:
  workflow_dispatch:

jobs:
  fix-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose current state
        run: |
          echo "=== Pages projects ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '.result[] | {name: .name, domains: .domains}'

          echo ""
          echo "=== hanzo-docs domains ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '.'

          echo ""
          echo "=== Check DNS zone access ==="
          ZONES=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=hanzo.ai" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "$ZONES" | jq '{success: .success, zone_count: (.result | length), permissions: .result[0].permissions // "no access"}'
          ZONE_ID=$(echo "$ZONES" | jq -r '.result[0].id // "none"')
          echo "Zone ID: $ZONE_ID"

          if [ "$ZONE_ID" != "none" ]; then
            echo ""
            echo "=== DNS records for docs.hanzo.ai ==="
            curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=docs.hanzo.ai" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '.'
          else
            echo "No DNS zone access — token may only have Pages scope"
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Fix Pages domain
        run: |
          echo "=== Delete deactivated domain ==="
          curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains/docs.hanzo.ai" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '{success: .success}'

          echo ""
          echo "=== Re-add domain ==="
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name": "docs.hanzo.ai"}' | jq '.'

          echo ""
          echo "=== Verify ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/hanzo-docs/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | jq '.result[] | {name: .name, status: .status}'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
