name: Deploy Docs

on:
  push:
    branches: [dev]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Extend swap for large build
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      # Build all workspace packages first (turbo handles deps)
      - name: Build packages
        run: pnpm build --filter=docs^...
        env:
          NODE_OPTIONS: '--max-old-space-size=16384'
        timeout-minutes: 30

      # Run opennextjs-cloudflare build (calls our buildCommand from open-next.config.ts)
      - name: Build for Cloudflare
        working-directory: apps/docs
        run: npx opennextjs-cloudflare build
        env:
          NODE_OPTIONS: '--max-old-space-size=16384'
        timeout-minutes: 60

      # Deploy to CF Workers (hanzo-docs-app)
      - name: Deploy Worker
        working-directory: apps/docs
        run: |
          npx wrangler deploy
          echo "$HANZO_API_KEY" | npx wrangler secret put HANZO_API_KEY --name hanzo-docs-app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
