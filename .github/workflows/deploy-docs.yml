name: Deploy Docs (Core)

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: hanzo-docs-build-linux-amd64
    permissions:
      contents: read
      deployments: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Team-owned doc sections (hanzo-docs/<team>) are mounted as git
          # submodules under apps/docs/content/docs/. Fetch them so the single
          # unified build compiles every section. Public HTTPS submodule URLs
          # need no extra credentials.
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # apps/docs `build:pre` runs `bun ./scripts/*.ts` (gen-services-nav, pre-build).
      # The containerized scale-set runner has no bun, so the build died instantly at
      # build:pre. The sibling deploys (bot-docs, etc.) already set bun up — match them.
      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - name: Extend swap for large build (best-effort)
        # NEVER block the deploy: the containerized scale-set runner can't sudo a
        # swapfile (fallocate → exit 255), which was hard-failing the whole build
        # and freezing docs.hanzo.ai on stale content. The build already caps the
        # Node heap at 16 GB below, so swap is a bonus, not a requirement.
        continue-on-error: true
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile 2>/dev/null || true
          sudo fallocate -l 12G /swapfile 2>/dev/null \
            || sudo dd if=/dev/zero of=/swapfile bs=1M count=12288 2>/dev/null || true
          sudo chmod 600 /swapfile 2>/dev/null || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h 2>/dev/null || true

      - run: pnpm build --filter=docs
        env:
          # One unified static export — core + every service + every OSS project.
          NEXT_EXPORT: '1'
          # Use the committed project-docs + openapi snapshot; do NOT re-sync.
          # The in-cluster sync-project-docs remote fetch is incomplete (no local
          # sibling repos → only the org index), which would drop every
          # /docs/projects/* page. The snapshot is checked in for determinism.
          HANZO_DOCS_SYNC: '0'
          NODE_OPTIONS: '--max-old-space-size=16384'
        timeout-minutes: 60

      # PaaS-native serve: package the export into hanzoai/static and push to GHCR.
      # docs.hanzo.ai is served by the in-cluster docs-landing Deployment behind
      # hanzoai/ingress — no Cloudflare. Built here on the self-hosted runner (docker
      # is present; "no GitHub builders" = no GitHub-HOSTED runners, self-hosted is ok).
      - name: Build + push native docs image (ghcr.io/hanzo-docs/docs)
        run: |
          cat > Dockerfile.serve <<'EOF'
          FROM ghcr.io/hanzoai/static:0.4.1
          COPY apps/docs/out /public
          EXPOSE 3000
          ENTRYPOINT ["/static", "-port", "3000", "-root", "/public"]
          EOF
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -f Dockerfile.serve -t ghcr.io/hanzo-docs/docs:latest -t "ghcr.io/hanzo-docs/docs:${GITHUB_SHA}" .
          docker push ghcr.io/hanzo-docs/docs:latest
          docker push "ghcr.io/hanzo-docs/docs:${GITHUB_SHA}"

      - name: Fetch CF credentials from KMS
        id: kms
        env:
          KMS_CLIENT_ID: ${{ secrets.KMS_CLIENT_ID }}
          KMS_CLIENT_SECRET: ${{ secrets.KMS_CLIENT_SECRET }}
          KMS_ENDPOINT: ${{ vars.KMS_ENDPOINT || 'https://kms.hanzo.ai' }}
          KMS_ORG: ${{ vars.KMS_ORG || 'hanzo' }}
          KMS_SECRET_ENV: ${{ vars.KMS_SECRET_ENV || 'prod' }}
        run: |
          # Canonical Hanzo KMS (/v1/kms): machine-identity login -> bearer,
          # then read CF Pages deploy creds from org path deploy/<NAME>.
          # Replaces the decommissioned Infisical /api routes (forwards-only).
          token=$(curl -fsS "${KMS_ENDPOINT}/v1/kms/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"${KMS_CLIENT_ID}\",\"clientSecret\":\"${KMS_CLIENT_SECRET}\"}" \
            | jq -r '.accessToken // empty')
          if [ -z "${token}" ]; then
            echo "::error::KMS login failed at ${KMS_ENDPOINT}/v1/kms/auth/login (check KMS_CLIENT_ID/KMS_CLIENT_SECRET)."
            exit 1
          fi
          kms_get() {
            curl -fsS "${KMS_ENDPOINT}/v1/kms/orgs/${KMS_ORG}/secrets/deploy/$1?env=${KMS_SECRET_ENV}" \
              -H "Authorization: Bearer ${token}" | jq -r '.secret.value // empty'
          }
          cf_token=$(kms_get CLOUDFLARE_API_TOKEN)
          cf_account=$(kms_get CLOUDFLARE_ACCOUNT_ID)
          if [ -z "${cf_token}" ] || [ -z "${cf_account}" ]; then
            echo "::error::CF credentials missing in KMS at ${KMS_ORG}/deploy (env ${KMS_SECRET_ENV})."
            exit 1
          fi
          echo "::add-mask::${cf_token}"
          echo "::add-mask::${cf_account}"
          echo "cf_token=${cf_token}" >> "$GITHUB_OUTPUT"
          echo "cf_account=${cf_account}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        working-directory: apps/docs
        run: pnpm dlx wrangler pages deploy out --project-name=hanzo-docs --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}

      # The edge router (docs.hanzo.ai/*) now passes every path through to the
      # single hanzo-docs Pages origin. Ship it with the content so the routing
      # never lags a section split — the stale-origin 530s came from exactly
      # that drift.
      - name: Deploy docs-router worker
        # Being retired — docs.hanzo.ai is moving to the in-cluster native serve.
        # The deploy token lacks Workers permission (auth 10000); never block on it.
        continue-on-error: true
        working-directory: workers/docs-router
        run: pnpm dlx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}
