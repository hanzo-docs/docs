name: Deploy Docs (Core)

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: hanzo-docs-build-linux-amd64
    permissions:
      contents: read
      deployments: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Team-owned doc sections (hanzo-docs/<team>) are mounted as git
          # submodules under apps/docs/content/docs/. Fetch them so the single
          # unified build compiles every section. Public HTTPS submodule URLs
          # need no extra credentials.
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # apps/docs `build:pre` runs `bun ./scripts/*.ts` (gen-services-nav, pre-build).
      # The containerized scale-set runner has no bun, so the build died instantly at
      # build:pre. The sibling deploys (bot-docs, etc.) already set bun up — match them.
      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - name: Extend swap for large build (best-effort)
        # NEVER block the deploy: the containerized scale-set runner can't sudo a
        # swapfile (fallocate → exit 255), which was hard-failing the whole build
        # and freezing docs.hanzo.ai on stale content. The build already caps the
        # Node heap at 16 GB below, so swap is a bonus, not a requirement.
        continue-on-error: true
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile 2>/dev/null || true
          sudo fallocate -l 12G /swapfile 2>/dev/null \
            || sudo dd if=/dev/zero of=/swapfile bs=1M count=12288 2>/dev/null || true
          sudo chmod 600 /swapfile 2>/dev/null || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h 2>/dev/null || true

      - run: pnpm build --filter=docs
        env:
          # One unified static export — core + every service + every OSS project.
          NEXT_EXPORT: '1'
          # Use the committed project-docs + openapi snapshot; do NOT re-sync.
          # The in-cluster sync-project-docs remote fetch is incomplete (no local
          # sibling repos → only the org index), which would drop every
          # /docs/projects/* page. The snapshot is checked in for determinism.
          HANZO_DOCS_SYNC: '0'
          NODE_OPTIONS: '--max-old-space-size=16384'
        timeout-minutes: 60

      # TEST GATE — a broken export never reaches the cluster. This catches the
      # exact failures that shipped before: an empty /out (bun missing → 404s)
      # and the trailingSlash regression (/docs written as docs.html, not
      # docs/index.html, which hanzoai/static 404s). Fail here == no deploy.
      - name: Validate export
        run: |
          out=apps/docs/out
          fail=0
          for f in index.html docs/index.html docs/services/index.html; do
            [ -s "$out/$f" ] || { echo "::error::missing or empty $out/$f"; fail=1; }
          done
          n=$(find "$out" -name '*.html' | wc -l)
          echo "html pages exported: $n"
          [ "$n" -ge 50 ] || { echo "::error::only $n html pages — export looks broken"; fail=1; }
          grep -q 'href="/docs/' "$out/docs/index.html" 2>/dev/null || { echo "::error::/docs carries no nav — shell-only render"; fail=1; }
          exit $fail

      # PaaS-native serve: package the export into hanzoai/static and push to GHCR.
      # docs.hanzo.ai is served by the in-cluster docs-landing Deployment behind
      # hanzoai/ingress — no Cloudflare. Built here on the self-hosted runner (docker
      # is present; "no GitHub builders" = no GitHub-HOSTED runners, self-hosted is ok).
      - name: Build + push native docs image (ghcr.io/hanzo-docs/docs)
        run: |
          cat > Dockerfile.serve <<'EOF'
          FROM ghcr.io/hanzoai/static:0.4.1
          COPY apps/docs/out /public
          EXPOSE 3000
          ENTRYPOINT ["/static", "-port", "3000", "-root", "/public"]
          EOF
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -f Dockerfile.serve -t ghcr.io/hanzo-docs/docs:latest -t "ghcr.io/hanzo-docs/docs:${GITHUB_SHA}" .
          docker push ghcr.io/hanzo-docs/docs:latest
          docker push "ghcr.io/hanzo-docs/docs:${GITHUB_SHA}"

      # DEPLOY (native, operator-driven). Declare the freshly-built immutable SHA
      # tag to the docs App CR; hanzo-operator reconciles the rollout. CI never
      # touches Deployments/pods, and no floating tag reaches the cluster. Auth is
      # the runner pod's in-cluster ServiceAccount, scoped by k8s/docs-cd-rbac.yaml
      # to get+patch ONLY app/docs in ns hanzo. docs.hanzo.ai is routed by the
      # universe file-provider entry to the docs Service (see k8s/docs-app.yaml).
      # This replaces the Cloudflare Pages + docs-router worker path entirely.
      - name: Deploy — declare tag to operator
        run: |
          curl -sSLo ./kubectl "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          ./kubectl -n hanzo patch app docs --type=merge \
            -p "{\"spec\":{\"image\":{\"tag\":\"${GITHUB_SHA}\"}}}"
          ./kubectl -n hanzo rollout status deploy/docs --timeout=300s

      # Re-index search (search.hanzo.ai) + the zen-coder-flash doc chat so both
      # answer from the just-shipped content. Best-effort — never block a deploy.
      - name: Re-index docs corpus
        continue-on-error: true
        run: |
          curl -fsS -X POST https://api.hanzo.ai/v1/index-docs \
            -H 'Content-Type: application/json' \
            -d "{\"site\":\"docs.hanzo.ai\",\"sha\":\"${GITHUB_SHA}\"}" \
            && echo "re-indexed" || echo "re-index skipped (endpoint/auth not ready) — non-blocking"
