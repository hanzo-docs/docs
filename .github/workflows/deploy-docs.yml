name: Deploy Docs

on:
  push:
    branches: [dev]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest-8core
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build --filter=docs
        env:
          NODE_OPTIONS: '--max-old-space-size=24576'
        timeout-minutes: 60

      # Deploy static assets + CF Pages Functions.
      # wrangler pages deploy looks for functions/ relative to cwd.
      - name: Deploy to Cloudflare Pages
        working-directory: apps/docs
        run: npx wrangler pages deploy out --project-name=hanzo-docs --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
