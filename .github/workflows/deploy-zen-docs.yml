name: Deploy Zen Docs

on:
  push:
    branches: [dev, main]
    paths:
      - 'apps/zen-docs/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-zen-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build --filter=zen-docs
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Create Cloudflare Pages project (if needed)
        continue-on-error: true
        run: pnpm dlx wrangler pages project create zen-docs --production-branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}

      - run: pnpm dlx wrangler pages deploy apps/zen-docs/out --project-name=zen-docs --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.kms.outputs.cf_account }}
